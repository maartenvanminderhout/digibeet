<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Afbeelding uploaden naar GitHub</title>
  <meta name="theme-color" content="#c85f8d" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <style>
    :root {
      --bg1: #f6eef2;
      --bg2: #efe7ed;
      --panel: rgba(255, 255, 255, .78);
      --panel-strong: #ffffff;
      --text: #16243a;
      --muted: #667892;
      --accent: #c85f8d;
      --accent2: #df84a9;
      --line: #e8dee5;
      --shadow: 0 16px 40px rgba(20, 33, 50, .10);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(255, 255, 255, .95), transparent 26%),
        radial-gradient(circle at 100% 0%, rgba(255, 255, 255, .9), transparent 24%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 680px);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, .7);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: clamp(24px, 5vw, 40px);
      backdrop-filter: blur(14px);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1;
      letter-spacing: -.04em;
    }

    p {
      margin: 0 0 26px;
      color: var(--muted);
      line-height: 1.55;
    }

    form {
      display: grid;
      gap: 18px;
    }

    label {
      display: grid;
      gap: 10px;
      font-weight: 800;
    }

    input[type="file"] {
      width: 100%;
      padding: 16px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 18px;
      color: var(--text);
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 16px 20px;
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: var(--shadow);
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      transition: .15s ease;
    }

    button:disabled {
      cursor: wait;
      opacity: .65;
    }

    button:not(:disabled):active {
      transform: scale(.98);
    }

    .status {
      min-height: 58px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, .62);
      color: var(--muted);
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .status.success {
      border-color: rgba(22, 163, 74, .35);
      color: #166534;
      background: rgba(240, 253, 244, .82);
    }

    .status.error {
      border-color: rgba(220, 38, 38, .35);
      color: #991b1b;
      background: rgba(254, 242, 242, .82);
    }

    .status a {
      color: inherit;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <a class="back-link" href="./">← Terug naar de site</a>
    <h1>Afbeelding uploaden naar GitHub</h1>
    <p>Kies een jpg-, jpeg-, png- of webp-afbeelding. De afbeelding wordt veilig via Supabase naar <strong>assets/images/</strong> in GitHub geüpload.</p>

    <form id="uploadForm">
      <label for="imageInput">
        Afbeelding
        <input id="imageInput" name="image" type="file" accept="image/jpeg,image/png,image/webp,.jpg,.jpeg,.png,.webp" required />
      </label>
      <button id="uploadButton" type="submit">Upload naar GitHub</button>
      <div id="status" class="status" role="status" aria-live="polite">Nog geen bestand gekozen.</div>
    </form>
  </main>

  <script src="admin.js" defer></script>
</body>
</html>
