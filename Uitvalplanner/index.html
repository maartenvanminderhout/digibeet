<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uitvalplanner school</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, Arial, sans-serif; background: #eef4ff; color: #1f2937; }
    button, input, select { font: inherit; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,0.45); display: flex; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
    .modal-card { width: min(760px, 100%); max-height: 90vh; overflow: auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 28px 80px rgba(0,0,0,0.22); }
    @media (max-width: 720px) {
      .planner-table { min-width: 720px; }
      .grid-auto { grid-template-columns: 1fr !important; }
      .daygrid { grid-template-columns: repeat(2, minmax(0,1fr)) !important; }
      .groupgrid { grid-template-columns: repeat(2, minmax(0,1fr)) !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useMemo, useState, useEffect } = React;

const DAYS = ["Maandag", "Dinsdag", "Woensdag", "Donderdag", "Vrijdag"];
const DAY_SHORT = { Maandag:"Ma", Dinsdag:"Di", Woensdag:"Wo", Donderdag:"Do", Vrijdag:"Vr" };
const CLASS_COLORS = ["#F97316", "#EAB308", "#22C55E", "#06B6D4", "#3B82F6", "#8B5CF6", "#EC4899", "#14B8A6", "#F43F5E", "#84CC16"];
const STORAGE_KEY = "uitvalplanner-kars-v13-manual-safe";

function generateId() { return Math.random().toString(36).slice(2, 10); }
function deepCopy(v) { return JSON.parse(JSON.stringify(v)); }
function colorForClass(classes, cls) { return CLASS_COLORS[Math.max(0, classes.indexOf(cls)) % CLASS_COLORS.length]; }
function weekParity(n){ return n % 2 === 0 ? "even" : "odd"; }
function getWeekNumber(dateStr){
  if(!dateStr) return 1;
  const date = new Date(dateStr + "T12:00:00");
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}
function patternLabel(value){
  return value === "every" ? "Elke week" : value === "alternate" ? "Om de week" : value === "odd" ? "Om de week" : value === "even" ? "Om de week" : "Niet";
}
function emptyPattern(){ return Object.fromEntries(DAYS.map(day => [day, 'none'])); }
function dayOrder(day){ return DAYS.indexOf(day); }
function dayStateFromPattern(value){
  return { enabled: value && value !== 'none', alternate: value === 'alternate' || value === 'odd' || value === 'even' };
}
function patternFromDayState(enabled, alternate){
  if(!enabled) return 'none';
  return alternate ? 'alternate' : 'every';
}
function memberWorksSomehowOnDay(member, day){
  const val = member.workPattern?.[day] || 'none';
  return val !== 'none';
}
function sortAbsenceItems(items, staff){
  return [...items].sort((a,b) => {
    const an = (byId(staff, a.staffId)?.name || '').localeCompare((byId(staff, b.staffId)?.name || ''), 'nl');
    if(an !== 0) return an;
    return dayOrder(a.day) - dayOrder(b.day);
  });
}
function normalizeMember(raw={}) {
  const pattern = { ...emptyPattern(), ...(raw.workPattern || {}) };
  return {
    id: raw.id || generateId(),
    name: raw.name || '',
    type: raw.type || 'Leerkracht',
    preferredGroups: Array.isArray(raw.preferredGroups) ? raw.preferredGroups : [],
    excludedGroups: Array.isArray(raw.excludedGroups) ? raw.excludedGroups : [],
    workPattern: pattern
  };
}
function availableOnDay(member, day, weekNumber, alternateSelections={}){
  if(member.type === 'Invaller') return false;
  const val = member.workPattern?.[day] || 'none';
  if(val === 'every') return true;
  if(val === 'alternate' || val === 'odd' || val === 'even') return (alternateSelections[day] || []).includes(member.id);
  return false;
}
function makeEmptySchedule(groups){
  const s = {};
  groups.forEach(g => {
    s[g] = {};
    DAYS.forEach(day => s[g][day] = []);
  });
  return s;
}
function makeEmptyManualPlanner(groups){
  const s = {};
  groups.forEach(g => {
    s[g] = {};
    DAYS.forEach(day => s[g][day] = { teachers: [], assistants: [], invallers: [], supporters: [], supportSlots: {} });
  });
  return s;
}
function normalizeManualPlanner(plan, groups){
  const base = makeEmptyManualPlanner(groups);
  groups.forEach(group => {
    DAYS.forEach(day => {
      const raw = plan?.[group]?.[day];
      if(Array.isArray(raw)){
        base[group][day] = { teachers: raw.map(item => typeof item === 'string' ? item : item?.memberId).filter(Boolean), assistants: [], invallers: [], supporters: [], supportSlots: {} };
      } else if(raw && typeof raw === 'object') {
        base[group][day] = {
          teachers: Array.isArray(raw.teachers) ? [...raw.teachers] : [],
          assistants: Array.isArray(raw.assistants) ? [...raw.assistants] : [],
          invallers: Array.isArray(raw.invallers) ? [...raw.invallers] : [],
          supporters: Array.isArray(raw.supporters) ? [...raw.supporters] : [],
          supportSlots: raw.supportSlots && typeof raw.supportSlots === 'object' ? JSON.parse(JSON.stringify(raw.supportSlots)) : {}
        };
      }
    });
  });
  return base;
}
function manualSlotShort(slot){
  if(slot?.am && slot?.pm) return 'hele dag';
  if(slot?.am) return 'ochtend';
  if(slot?.pm) return 'middag';
  return '—';
}
function seedSchedule(groups, staff, weekNumber=1){
  const s = makeEmptySchedule(groups);
  const usedByDay = Object.fromEntries(DAYS.map(day => [day, new Set()]));
  DAYS.forEach(day => {
    groups.forEach(group => {
      const ranked = staff
        .filter(m => m.type === 'Leerkracht' && availableOnDay(m, day, weekNumber))
        .filter(m => !usedByDay[day].has(m.id))
        .sort((a,b) => {
          const ap = Number((a.preferredGroups||[]).includes(group));
          const bp = Number((b.preferredGroups||[]).includes(group));
          if (bp !== ap) return bp - ap;
          return a.name.localeCompare(b.name, 'nl');
        });
      const chosen = ranked[0];
      if(chosen){
        s[group][day] = [chosen.id];
        usedByDay[day].add(chosen.id);
      }
    });
  });
  return s;
}
function byId(staff, id){ return staff.find(s => s.id === id); }
function getAssignmentsForDay(schedule, day){
  const used = new Map();
  Object.keys(schedule).forEach(group => (schedule[group]?.[day] || []).forEach(id => used.set(id, group)));
  return used;
}
function removeMemberFromSchedule(schedule, memberId){
  const s = deepCopy(schedule);
  Object.keys(s).forEach(group => DAYS.forEach(day => { s[group][day] = (s[group][day] || []).filter(x => x !== memberId); }));
  return s;
}
function groupOfAbsence(abs, schedule){
  if(abs.group) return abs.group;
  for(const g of Object.keys(schedule)) {
    if((schedule[g]?.[abs.day] || []).includes(abs.staffId)) return g;
  }
  return '';
}
function removeAbsencesFromSchedule(schedule, absences){
  const s = deepCopy(schedule);
  absences.forEach(abs => {
    const group = groupOfAbsence(abs, s);
    if(group) s[group][abs.day] = (s[group][abs.day] || []).filter(x => x !== abs.staffId);
  });
  return s;
}
function canTeachGroup(member, group){
  return !((member.excludedGroups || []).includes(group));
}
function isIncludedForGeneration(memberId, includedIds){
  return !includedIds || !includedIds.length || includedIds.includes(memberId);
}
function isAssignedOnDay(schedule, memberId, day){
  return Object.keys(schedule).some(group => (schedule[group]?.[day] || []).includes(memberId));
}
function assignedGroupOnDay(schedule, memberId, day){
  for(const group of Object.keys(schedule)){
    if((schedule[group]?.[day] || []).includes(memberId)) return group;
  }
  return '';
}
function fixedDayMeta(member, day, schedule, weekNumber, alternateSelections={}){
  const pattern = member.workPattern?.[day] || 'none';
  const hasWorkday = pattern !== 'none';
  const activeThisWeek = availableOnDay(member, day, weekNumber, alternateSelections);
  const inClass = isAssignedOnDay(schedule, member.id, day);
  if(inClass) return { label: DAY_SHORT[day], bg:'#fee2e2', color:'#b91c1c', border:'#fecaca', title:'Staat die dag voor de klas' };
  if(hasWorkday && activeThisWeek) return { label: DAY_SHORT[day], bg:'#dcfce7', color:'#166534', border:'#86efac', title:'Werkt die dag ambulant / buiten de klas' };
  if(hasWorkday) return { label: DAY_SHORT[day] + '*', bg:'#f8fafc', color:'#64748b', border:'#cbd5e1', title:'Om-de-week werkdag, deze week niet actief' };
  return { label: DAY_SHORT[day], bg:'#f8fafc', color:'#94a3b8', border:'#e2e8f0', title:'Geen vaste werkdag' };
}

function availableByCategory(member, day, weekNumber, category, selectedExtraIds, alternateSelections){
  if(category === 'withInvaller') return availableOnDay(member, day, weekNumber, alternateSelections) || member.type === 'Invaller';
  if(category === 'schoolOnly') return availableOnDay(member, day, weekNumber, alternateSelections) || selectedExtraIds.includes(member.id);
  return availableOnDay(member, day, weekNumber, alternateSelections);
}
function variantWeights(variant){
  const map = {
    sameDay_free:     { freeBonus: 34, shiftPenalty: 70, fallbackPenalty: 18, invallerPenalty: 999, oaPenalty: 8, extraSelectedBonus: 0, sameGroupBonus: 24, preferredBonus: 34, worksTodayBonus: 24, keepCurrentPlanBonus: 26 },
    sameDay_shift:    { freeBonus: 18, shiftPenalty: 26, fallbackPenalty: 12, invallerPenalty: 999, oaPenalty: 7, extraSelectedBonus: 0, sameGroupBonus: 26, preferredBonus: 34, worksTodayBonus: 24, keepCurrentPlanBonus: 24 },
    school_free:      { freeBonus: 32, shiftPenalty: 56, fallbackPenalty: 18, invallerPenalty: 999, oaPenalty: 8, extraSelectedBonus: 10, sameGroupBonus: 24, preferredBonus: 34, worksTodayBonus: 24, keepCurrentPlanBonus: 24 },
    school_shift:     { freeBonus: 16, shiftPenalty: 24, fallbackPenalty: 10, invallerPenalty: 999, oaPenalty: 7, extraSelectedBonus: 14, sameGroupBonus: 24, preferredBonus: 34, worksTodayBonus: 22, keepCurrentPlanBonus: 22 },
    invaller_light:   { freeBonus: 30, shiftPenalty: 32, fallbackPenalty: 10, invallerPenalty: 28, oaPenalty: 6, extraSelectedBonus: 8, sameGroupBonus: 22, preferredBonus: 32, worksTodayBonus: 20, keepCurrentPlanBonus: 22 },
    invaller_plus:    { freeBonus: 14, shiftPenalty: 18, fallbackPenalty: 8, invallerPenalty: 10, oaPenalty: 5, extraSelectedBonus: 8, sameGroupBonus: 20, preferredBonus: 30, worksTodayBonus: 18, keepCurrentPlanBonus: 18 }
  };
  return map[variant.id] || map.sameDay_free;
}
function scoreCandidateDetailed(member, group, day, weekNumber, category, selectedExtraIds, schedule, alternateSelections, variant){
  if(!canTeachGroup(member, group)) return -99999;
  const weights = variantWeights(variant || { id:'sameDay_free' });
  let score = 0;
  const assignedToday = isAssignedOnDay(schedule, member.id, day);
  const assignedGroup = assignedGroupOnDay(schedule, member.id, day);
  const worksToday = availableOnDay(member, day, weekNumber, alternateSelections);
  const isExtraSelected = selectedExtraIds.includes(member.id) && !worksToday;

  if((member.preferredGroups||[]).includes(group)) score += weights.preferredBonus;
  if(worksToday) score += weights.worksTodayBonus;
  if(isExtraSelected) score += weights.extraSelectedBonus;
  if(assignedGroup === group) score += weights.sameGroupBonus;
  if(!assignedToday) score += weights.freeBonus;
  else score -= 8;

  if(member.type === 'Onderwijsassistent') score -= weights.oaPenalty;
  if(member.type === 'Invaller') score -= weights.invallerPenalty;
  if(assignedToday && assignedGroup === group) score += weights.keepCurrentPlanBonus;
  if(category === 'sameDayOnly' && !worksToday) score -= 60;
  if(category === 'schoolOnly' && isExtraSelected) score += 4;
  return score;
}
function buildReasonList(member, group, day, weekNumber, category, selectedExtraIds, alternateSelections){
  const reasons = [];
  if((member.preferredGroups||[]).includes(group)) reasons.push('voorkeursgroep');
  if(availableOnDay(member, day, weekNumber, alternateSelections)) reasons.push('werkt die dag');
  if(member.type === 'Invaller') reasons.push('invaller');
  if(member.type === 'Onderwijsassistent') reasons.push('onderwijsassistent');
  if(category === 'schoolOnly' && selectedExtraIds.includes(member.id) && !availableOnDay(member, day, weekNumber, alternateSelections)) reasons.push('extra aangezet');
  return reasons;
}
function unresolvedImpactedCount(plan, impacted){
  return impacted.filter(abs => ((plan[abs.group]?.[abs.day]) || []).length === 0).length;
}
function generateScenarioOptions({ groups, staff, schedule, absences, weekNumber, settings, selectedExtraIds, alternateSelections, includedForGenerationIds }){
  const absentIdsByDay = Object.fromEntries(DAYS.map(day => [day, absences.filter(a => a.day === day).map(a => a.staffId)]));
  const base = removeAbsencesFromSchedule(schedule, absences);
  const impacted = absences.map(abs => ({ ...abs, group: groupOfAbsence(abs, schedule) })).filter(x => x.group);
  const variantDefs = [];

  if(settings.sameDayOnly){
    variantDefs.push(
      { id:'sameDay_free', category:'Binnen huidige bezetting', title:'Binnen huidige bezetting · minimale wijziging', desc:'Zoekt eerst vrije collega\'s die die dag al werken. Houdt de bestaande planning zo veel mogelijk intact.', allowShift:false, categoryKey:'sameDayOnly', beam:5 },
      { id:'sameDay_shift', category:'Binnen huidige bezetting', title:'Binnen huidige bezetting · slim schuiven', desc:'Schuift alleen met collega\'s die die dag al werken als dat echt een betere oplossing geeft en probeert de rest van het rooster te behouden.', allowShift:true, categoryKey:'sameDayOnly', beam:6 }
    );
  }
  if(settings.schoolOnly){
    variantDefs.push(
      { id:'school_free', category:'Alleen eigen schoolteam', title:'Alleen eigen schoolteam · vrije collega\'s eerst', desc:'Gebruikt eigen leerkrachten en onderwijsassistenten, plus extra aangevinkte collega\'s. Probeert eerst vrije mensen te vinden.', allowShift:false, categoryKey:'schoolOnly', beam:6 },
      { id:'school_shift', category:'Alleen eigen schoolteam', title:'Alleen eigen schoolteam · breder schuiven', desc:'Mag binnen het eigen team breder schuiven, maar straft onnodige roosterwijzigingen af.', allowShift:true, categoryKey:'schoolOnly', beam:7 }
    );
  }
  if(settings.withInvaller){
    variantDefs.push(
      { id:'invaller_light', category:'Met invaller', title:'Met invaller · pas als nodig', desc:'Probeert eerst intern op te lossen en zet pas een invaller in als dat nodig is.', allowShift:false, categoryKey:'withInvaller', beam:6 },
      { id:'invaller_plus', category:'Met invaller', title:'Met invaller · beste dekking', desc:'Zoekt de best passende dekking en mag intern schuiven of een invaller inzetten als dat het rooster sterker maakt.', allowShift:true, categoryKey:'withInvaller', beam:7 }
    );
  }
  if(!variantDefs.length){
    variantDefs.push({ id:'sameDay_free', category:'Binnen huidige bezetting', title:'Binnen huidige bezetting · minimale wijziging', desc:'Standaardoptie.', allowShift:false, categoryKey:'sameDayOnly', beam:5 });
  }

  function candidatePool(variant, abs, plan){
    return staff.filter(member => {
      if(member.id === abs.staffId) return false;
      if(!isIncludedForGeneration(member.id, includedForGenerationIds)) return false;
      if(absentIdsByDay[abs.day].includes(member.id)) return false;
      if(!canTeachGroup(member, abs.group)) return false;
      if(!availableByCategory(member, abs.day, weekNumber, variant.categoryKey, selectedExtraIds, alternateSelections)) return false;
      return member.type === 'Leerkracht' || member.type === 'Onderwijsassistent' || (variant.categoryKey === 'withInvaller' && member.type === 'Invaller');
    }).sort((a,b) => scoreCandidateDetailed(b, abs.group, abs.day, weekNumber, variant.categoryKey, selectedExtraIds, plan, alternateSelections, variant) - scoreCandidateDetailed(a, abs.group, abs.day, weekNumber, variant.categoryKey, selectedExtraIds, plan, alternateSelections, variant));
  }

  function freeFallbackPool(plan, group, day, variant, blockedIds=[]){
    return staff.filter(member => {
      if(blockedIds.includes(member.id)) return false;
      if(!isIncludedForGeneration(member.id, includedForGenerationIds)) return false;
      if(absentIdsByDay[day].includes(member.id)) return false;
      if(!canTeachGroup(member, group)) return false;
      if(!availableByCategory(member, day, weekNumber, variant.categoryKey, selectedExtraIds, alternateSelections)) return false;
      if(isAssignedOnDay(plan, member.id, day)) return false;
      return member.type === 'Leerkracht' || member.type === 'Onderwijsassistent' || (variant.categoryKey === 'withInvaller' && member.type === 'Invaller');
    }).sort((a,b) => scoreCandidateDetailed(b, group, day, weekNumber, variant.categoryKey, selectedExtraIds, plan, alternateSelections, variant) - scoreCandidateDetailed(a, group, day, weekNumber, variant.categoryKey, selectedExtraIds, plan, alternateSelections, variant));
  }

  function impactedDifficulty(variant, abs, plan){
    const pool = candidatePool(variant, abs, plan);
    const top = pool[0] ? scoreCandidateDetailed(pool[0], abs.group, abs.day, weekNumber, variant.categoryKey, selectedExtraIds, plan, alternateSelections, variant) : -999;
    return { count: pool.length, top };
  }

  function stateKey(plan){
    return groups.map(group => DAYS.map(day => (plan[group]?.[day] || []).slice().sort().join(',')).join('|')).join('||');
  }

  function compareStates(a,b){
    if(a.unresolved !== b.unresolved) return a.unresolved - b.unresolved;
    if(a.cost !== b.cost) return a.cost - b.cost;
    if(a.moveCount !== b.moveCount) return a.moveCount - b.moveCount;
    if(a.invallerCount !== b.invallerCount) return a.invallerCount - b.invallerCount;
    if(a.oaCount !== b.oaCount) return a.oaCount - b.oaCount;
    if(a.changedCells !== b.changedCells) return a.changedCells - b.changedCells;
    return b.quality - a.quality;
  }

  function uniqueBestStates(states, beam){
    const sorted = [...states].sort(compareStates);
    const seen = new Set();
    const out = [];
    for(const st of sorted){
      const key = stateKey(st.plan);
      if(seen.has(key)) continue;
      seen.add(key);
      out.push(st);
      if(out.length >= beam) break;
    }
    return out;
  }

  function evaluateMoveAction(variant, abs, plan, cand){
    const weights = variantWeights(variant);
    const assignedGroup = assignedGroupOnDay(plan, cand.id, abs.day);
    const directScore = scoreCandidateDetailed(cand, abs.group, abs.day, weekNumber, variant.categoryKey, selectedExtraIds, plan, alternateSelections, variant);
    const baseReasons = buildReasonList(cand, abs.group, abs.day, weekNumber, variant.categoryKey, selectedExtraIds, alternateSelections);

    if(!assignedGroup){
      return {
        planPatch: (nextPlan) => { nextPlan[abs.group][abs.day] = [cand.id]; },
        quality: directScore,
        cost: Math.max(0, 130 - directScore),
        moveCount: 0,
        invallerCount: cand.type === 'Invaller' ? 1 : 0,
        oaCount: cand.type === 'Onderwijsassistent' ? 1 : 0,
        changedCells: 1,
        changeLines: [`${abs.group} ${DAY_SHORT[abs.day]}: ${byId(staff, abs.staffId)?.name || 'Onbekend'} → ${cand.name}${baseReasons.length ? ` (${baseReasons.join(', ')})` : ''}`]
      };
    }

    if(!variant.allowShift || assignedGroup === abs.group) return null;

    const remainingAtFrom = (plan[assignedGroup]?.[abs.day] || []).filter(id => id !== cand.id);
    if(remainingAtFrom.length > 0){
      return {
        planPatch: (nextPlan) => {
          nextPlan[assignedGroup][abs.day] = remainingAtFrom;
          nextPlan[abs.group][abs.day] = [cand.id];
        },
        quality: directScore - weights.shiftPenalty,
        cost: Math.max(0, 150 - directScore + weights.shiftPenalty),
        moveCount: 1,
        invallerCount: cand.type === 'Invaller' ? 1 : 0,
        oaCount: cand.type === 'Onderwijsassistent' ? 1 : 0,
        changedCells: 2,
        changeLines: [
          `${assignedGroup} ${DAY_SHORT[abs.day]}: ${cand.name} schuift naar ${abs.group}; ${assignedGroup} blijft verder ongewijzigd.`,
          `${abs.group} ${DAY_SHORT[abs.day]}: ${byId(staff, abs.staffId)?.name || 'Onbekend'} → ${cand.name}${baseReasons.length ? ` (${baseReasons.join(', ')})` : ''}`
        ]
      };
    }

    const fallbackOptions = freeFallbackPool(plan, assignedGroup, abs.day, variant, [cand.id]).slice(0,3);
    if(!fallbackOptions.length) return null;

    return fallbackOptions.map(fallback => {
      const fallbackScore = scoreCandidateDetailed(fallback, assignedGroup, abs.day, weekNumber, variant.categoryKey, selectedExtraIds, plan, alternateSelections, variant);
      return {
        planPatch: (nextPlan) => {
          nextPlan[assignedGroup][abs.day] = [fallback.id];
          nextPlan[abs.group][abs.day] = [cand.id];
        },
        quality: directScore + Math.max(0, fallbackScore * 0.55) - weights.shiftPenalty - weights.fallbackPenalty,
        cost: Math.max(0, 170 - directScore - Math.max(0, fallbackScore * 0.35) + weights.shiftPenalty + weights.fallbackPenalty),
        moveCount: 1,
        invallerCount: (cand.type === 'Invaller' ? 1 : 0) + (fallback.type === 'Invaller' ? 1 : 0),
        oaCount: (cand.type === 'Onderwijsassistent' ? 1 : 0) + (fallback.type === 'Onderwijsassistent' ? 1 : 0),
        changedCells: 2,
        changeLines: [
          `${assignedGroup} ${DAY_SHORT[abs.day]}: ${cand.name} schuift naar ${abs.group}; ${fallback.name} vult daarna ${assignedGroup} op.`,
          `${abs.group} ${DAY_SHORT[abs.day]}: ${byId(staff, abs.staffId)?.name || 'Onbekend'} → ${cand.name}${baseReasons.length ? ` (${baseReasons.join(', ')})` : ''}`
        ]
      };
    });
  }

  function normalizeActions(result){
    if(!result) return [];
    return Array.isArray(result) ? result : [result];
  }

  return variantDefs.map(variant => {
    const startingState = { plan: deepCopy(base), changes: [], warnings: [], unresolved: 0, cost: 0, quality: 0, moveCount: 0, invallerCount: 0, oaCount: 0, changedCells: 0 };
    let states = [startingState];

    const impactedOrdered = [...impacted].sort((a,b) => {
      const ad = impactedDifficulty(variant, a, base);
      const bd = impactedDifficulty(variant, b, base);
      if(ad.count !== bd.count) return ad.count - bd.count;
      if(ad.top !== bd.top) return ad.top - bd.top;
      return dayOrder(a.day) - dayOrder(b.day);
    });

    impactedOrdered.forEach(abs => {
      const nextStates = [];
      for(const state of states){
        const plan = state.plan;
        const absentMember = byId(staff, abs.staffId);
        const existing = plan[abs.group]?.[abs.day] || [];
        if(existing.length > 0){
          const presentNames = existing.map(id => byId(staff, id)?.name).filter(Boolean).join(', ');
          nextStates.push({
            ...state,
            changes: [...state.changes, `${abs.group} ${DAY_SHORT[abs.day]}: ${absentMember?.name || 'Onbekend'} afwezig, maar groep blijft staan met ${presentNames}.`],
            quality: state.quality + 18
          });
          continue;
        }

        const pool = candidatePool(variant, abs, plan).slice(0, 8);
        const actions = pool.flatMap(cand => normalizeActions(evaluateMoveAction(variant, abs, plan, cand)));

        if(actions.length){
          actions.forEach(action => {
            const nextPlan = deepCopy(plan);
            action.planPatch(nextPlan);
            nextStates.push({
              plan: nextPlan,
              changes: [...state.changes, ...action.changeLines],
              warnings: [...state.warnings],
              unresolved: state.unresolved,
              cost: state.cost + action.cost,
              quality: state.quality + action.quality,
              moveCount: state.moveCount + action.moveCount,
              invallerCount: state.invallerCount + action.invallerCount,
              oaCount: state.oaCount + action.oaCount,
              changedCells: state.changedCells + action.changedCells
            });
          });
        } else {
          nextStates.push({
            ...state,
            unresolved: state.unresolved + 1,
            cost: state.cost + 220,
            warnings: [...state.warnings, `${abs.group} op ${abs.day} heeft in deze categorie geen passende vervanger. Absoluut-niet groepen, huidige planning en beschikbaarheid blokkeren hier de opties.`]
          });
        }
      }
      states = uniqueBestStates(nextStates, variant.beam || 6);
    });

    const completed = states.filter(st => st.unresolved === 0);
    const chosen = (completed.length ? uniqueBestStates(completed, 1) : uniqueBestStates(states, 1))[0] || startingState;
    const unresolvedImpacted = chosen.unresolved;
    const score = Math.max(1, 100 - unresolvedImpacted * 40 - chosen.moveCount * 7 - chosen.invallerCount * 6 - chosen.oaCount * 3 - Math.round(chosen.cost / 40) + Math.round(chosen.quality / 35));
    const notes = [...chosen.warnings];
    if(unresolvedImpacted === 0) notes.unshift('Deze optie dekt alle ingevoerde uitval voor de hele week.');
    return {
      id: variant.id,
      category: variant.category,
      title: variant.title,
      desc: variant.desc,
      plan: chosen.plan,
      changes: chosen.changes,
      warnings: notes,
      unresolved: [],
      unresolvedImpacted,
      completeWeekCoverage: unresolvedImpacted === 0,
      score
    };
  }).sort((a,b) => {
    if((b.completeWeekCoverage ? 1 : 0) !== (a.completeWeekCoverage ? 1 : 0)) return (b.completeWeekCoverage ? 1 : 0) - (a.completeWeekCoverage ? 1 : 0);
    return b.score - a.score;
  });
}

}

                          return (
                            <div key={member.id} style={{ borderRadius:10, border:`1px solid ${on ? '#d8b4fe' : '#e2e8f0'}`, background:on ? '#f3e8ff' : 'white', overflow:'hidden' }}>
                              <div onClick={() => !member.absentToday && toggleManualAssignment(group, day, member.id, 'supporters')} style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 10px', cursor: member.absentToday ? 'not-allowed' : 'pointer', opacity: member.absentToday ? 0.55 : 1 }}>
                                <span>{on ? '✅' : '⬜'}</span>
                                <div style={{ display:'flex', flexDirection:'column', minWidth:0, gap:4 }}>
                                  <span style={{ fontSize:13, fontWeight:700, color:member.absentToday ? '#b91c1c' : on ? '#7c3aed' : '#374151' }}>🤝 {member.name} {sameDay.length ? '⚠️' : ''} {member.absentToday ? '🚑' : ''}</span>
                                  <span style={{ fontSize:11, color:member.absentToday ? '#dc2626' : sameDay.length ? '#dc2626' : '#94a3b8' }}>{member.absentToday ? `Ziek op ${day}` : sameDay.length ? `Ook op ${day}: ${sameDay.map(item => `${item.group} (${item.role})`).join(', ')}` : member.prefersGroup ? `Voorkeursgroep ${group}` : memberWorksSomehowOnDay(member, day) ? `Werkt op ${day}` : 'Geen vaste werkdag op deze dag'}</span>
                                  {renderManualMetaBadges(member, day)}
                                  <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>{renderWorkPatternChips(member)}</div>
                                </div>
                              </div>
                              {on && <div style={{ padding:'4px 10px 8px', borderTop:'1px solid #DDD6FE', display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>{[['am','Ochtend'],['pm','Middag']].map(([key,label]) => { const active = slot[key]; return <button key={key} onClick={() => setManualSupportSlot(group, day, member.id, { ...slot, [key]: !active })} style={{ padding:'3px 10px', borderRadius:6, border:'none', fontSize:11, fontWeight:700, cursor:'pointer', background:active ? '#7C3AED' : '#F3E8FF', color:active ? 'white' : '#6D28D9' }}>{label}</button>; })}</div>}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}
              </Modal>
            </div>
          );
        })()}

        {page === 'absence' && (
          <div className="grid-auto" style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(320px,1fr))', gap:16 }}>
            <div style={{ ...cardStyle, padding:18 }}>
              <h2 style={{ margin:'0 0 8px', color:'#1e3a5f' }}>Uitval invoeren</h2>
              <div style={{ color:'#64748b', fontSize:14, marginBottom:14 }}>Kies één medewerker en meerdere afwezigheidsdagen. Dubbele ziekmeldingen op dezelfde dag worden automatisch tegengehouden en de lijst wordt logisch gesorteerd.</div>
              <label style={{ display:'block', fontWeight:800, marginBottom:6 }}>Afwezige medewerker</label>
              <select value={absenceStaffId} onChange={(e) => setAbsenceStaffId(e.target.value)} style={{ ...input, marginBottom:14 }}>
                <option value="">Kies medewerker</option>
                {[...staff].sort((a,b)=>a.name.localeCompare(b.name,'nl')).map(t => <option key={t.id} value={t.id}>{t.name} · {t.type}</option>)}
              </select>
              <label style={{ display:'block', fontWeight:800, marginBottom:8 }}>Afwezig op</label>
              <div className="daygrid" style={{ display:'grid', gridTemplateColumns:'repeat(5,minmax(0,1fr))', gap:8, marginBottom:14 }}>
                {DAYS.map(day => <button key={day} onClick={() => toggleAbsenceDay(day)} style={chipBtn(absenceDays.includes(day))}>{DAY_SHORT[day]}</button>)}
              </div>
              <button onClick={addAbsenceSelection} style={{ ...btn, background:'#7c3aed', color:'white', width:'100%', marginBottom:18 }}>+ Afwezigheid toevoegen</button>

              <div style={{ borderTop:'1px solid #e2e8f0', paddingTop:14, color:'#64748b', fontSize:14 }}>
                De instellingen voor het genereren staan nu op het tabblad <strong>Genereer</strong>.
              </div>
            </div>

            <div style={{ ...cardStyle, padding:18 }}>
              <h3 style={{ margin:'0 0 8px', color:'#1e3a5f' }}>Ingevoerde afwezigheden</h3>
              <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:16 }}>
                {absences.length ? sortAbsenceItems(absences, staff).map(abs => {
                  const member = byId(staff, abs.staffId);
                  return <div key={abs.id} style={{ padding:'10px 12px', borderRadius:12, background:'#f8fafc', border:'1px solid #e2e8f0', display:'flex', justifyContent:'space-between', gap:10, alignItems:'center' }}>
                    <div><strong>{member?.name}</strong> · {abs.day}{abs.group ? ` · ${abs.group}` : ' · groep onbekend'}</div>
                    <button onClick={() => setAbsences(prev => sortAbsenceItems(prev.filter(a => a.id !== abs.id), staff))} style={{ ...btn, background:'#fee2e2', color:'#991b1b', padding:'6px 10px' }}>Verwijder</button>
                  </div>
                }) : <div style={{ color:'#94a3b8' }}>Nog geen afwezigheden ingevoerd.</div>}
              </div>
              <h3 style={{ margin:'0 0 8px', color:'#1e3a5f' }}>Leerkrachten passend bij gekozen dagen</h3>
              <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                {availableTeachersForPickedDays.length ? availableTeachersForPickedDays.sort((a,b)=>a.name.localeCompare(b.name,'nl')).map(t => (
                  <div key={t.id} style={{ padding:'10px 12px', borderRadius:12, background:'#f8fafc', border:'1px solid #e2e8f0' }}>
                    <div style={{ fontWeight:800 }}>{memberBadge(t)}{t.name}</div>
                    <div style={{ fontSize:13, color:'#64748b', marginTop:4 }}>Voorkeur: {(t.preferredGroups || []).join(', ') || 'geen'}</div>
                  </div>
                )) : <div style={{ color:'#94a3b8' }}>Geen selectie of geen leerkracht passend op alle gekozen dagen.</div>}
              </div>
            </div>
          </div>
        )}

        {page === 'scenarios' && (
          <div style={{ display:'grid', gap:16 }}>
            <div style={{ ...cardStyle, padding:18 }}>
              <div style={{ display:'flex', justifyContent:'space-between', gap:12, alignItems:'flex-start', flexWrap:'wrap', marginBottom:14 }}>
                <div>
                  <h2 style={{ margin:'0 0 4px', color:'#1e3a5f' }}>Genereer opties</h2>
                  <div style={{ color:'#64748b', fontSize:14 }}>Kies hier welke soorten oplossingen je wilt zien. Onderwijsassistenten tellen mee als leerkrachten. De generator zoekt nu per categorie meerdere best mogelijke opties en houdt rekening met absoluut-niet groepen, huidige planning, voorkeursgroepen en wie die dag al werkt. Voor medewerkers die om de week werken kun je hieronder per dag aangeven of ze deze week meedoen.</div>
                </div>
                <button onClick={findAbsencesForSelection} style={{ ...btn, background:'#2563eb', color:'white' }}>✨ Genereer planning</button>
              </div>

              <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))', gap:16 }}>
                <div>
                  <div style={{ fontWeight:900, marginBottom:8 }}>Instellingen</div>
                  <label style={{ display:'flex', gap:10, alignItems:'flex-start', marginBottom:8 }}><input type="checkbox" checked={scenarioSettings.sameDayOnly} onChange={() => setScenarioSettings(prev => ({...prev, sameDayOnly: !prev.sameDayOnly}))} /> <span>Maak opties binnen de huidige bezetting van die dag</span></label>
                  <label style={{ display:'flex', gap:10, alignItems:'flex-start', marginBottom:8 }}><input type="checkbox" checked={scenarioSettings.withInvaller} onChange={() => setScenarioSettings(prev => ({...prev, withInvaller: !prev.withInvaller}))} /> <span>Maak opties met een invaller</span></label>
                  <label style={{ display:'flex', gap:10, alignItems:'flex-start', marginBottom:12 }}><input type="checkbox" checked={scenarioSettings.schoolOnly} onChange={() => setScenarioSettings(prev => ({...prev, schoolOnly: !prev.schoolOnly}))} /> <span>Maak opties met alleen eigen schoolteam</span></label>

                  <div style={{ marginBottom:14 }}>
                    <div style={{ color:'#64748b', fontSize:13, marginBottom:8 }}>Bepaal per medewerker of die mag worden meegenomen bij het genereren van oplossingen:</div>
                    <div className="groupgrid" style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))', gap:8 }}>
                      {generationPool.map(m => {
                        const included = includedForGenerationIds.includes(m.id);
                        return <button key={m.id} onClick={() => setIncludedForGenerationIds(prev => prev.includes(m.id) ? prev.filter(x => x !== m.id) : [...prev, m.id])} style={{ ...chipBtn(included), textAlign:'left', padding:'10px 12px', minHeight:92, display:'flex', flexDirection:'column', alignItems:'flex-start', justifyContent:'center', opacity: included ? 1 : 0.6 }}>
                          <div style={{ width:'100%', display:'flex', justifyContent:'space-between', alignItems:'center', gap:8 }}>
                            <div style={{ fontWeight:900, fontSize:16, lineHeight:1.15 }}>{memberBadge(m)}{m.name}</div>
                            <div style={{ fontSize:11, fontWeight:900, color: included ? '#166534' : '#991b1b' }}>{included ? 'Aan' : 'Uit'}</div>
                          </div>
                          <div style={{ display:'flex', gap:4, flexWrap:'wrap', marginTop:8 }}>
                            {DAYS.map(day => {
                              const meta = fixedDayMeta(m, day, assignments, weekNumber, alternateSelections);
                              return <span key={day} title={meta.title} style={{ fontSize:10, fontWeight:800, padding:'2px 6px', borderRadius:999, background:meta.bg, color:meta.color, border:`1px solid ${meta.border}` }}>{meta.label}</span>;
                            })}
                          </div>
                        </button>;
                      })}
                    </div>
                  </div>

                  {scenarioSettings.schoolOnly && (
                    <div>
                      <div style={{ color:'#64748b', fontSize:13, marginBottom:8 }}>Extra collega's die mee mogen doen, ook als ze normaal niet op die dag werken:</div>
                      <div className="groupgrid" style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))', gap:8 }}>
                        {[...teachingPool].sort((a,b)=>a.name.localeCompare(b.name,'nl')).map(m => {
                          const selected = selectedExtraIds.includes(m.id);
                          const included = includedForGenerationIds.includes(m.id);
                          return <button key={m.id} onClick={() => included && setSelectedExtraIds(prev => prev.includes(m.id) ? prev.filter(x => x !== m.id) : [...prev, m.id])} style={{ ...chipBtn(selected), textAlign:'left', padding:'10px 12px', minHeight:78, display:'flex', flexDirection:'column', alignItems:'flex-start', justifyContent:'center', opacity: included ? 1 : 0.45, cursor: included ? 'pointer' : 'not-allowed' }}>
                            <div style={{ width:'100%', display:'flex', justifyContent:'space-between', alignItems:'center', gap:8 }}>
                              <div style={{ fontWeight:900, fontSize:16, lineHeight:1.15 }}>{memberBadge(m)}{m.name}</div>
                              {!included && <div style={{ fontSize:10, fontWeight:900, color:'#991b1b' }}>Uit</div>}
                            </div>
                            <div style={{ display:'flex', gap:4, flexWrap:'wrap', marginTop:8 }}>
                              {DAYS.map(day => {
                                const meta = fixedDayMeta(m, day, assignments, weekNumber, alternateSelections);
                                return <span key={day} title={meta.title} style={{ fontSize:10, fontWeight:800, padding:'2px 6px', borderRadius:999, background:meta.bg, color:meta.color, border:`1px solid ${meta.border}` }}>{meta.label}</span>;
                              })}
                            </div>
                          </button>;
                        })}
                      </div>
                    </div>
                  )}

                  <div style={{ fontWeight:900, margin:'16px 0 8px' }}>Om-de-week medewerkers meenemen</div>
                  <div style={{ display:'grid', gap:10 }}>
                    {DAYS.map(day => (
                      <div key={day} style={{ padding:'10px 12px', borderRadius:12, background:'#f8fafc', border:'1px solid #e2e8f0' }}>
                        <div style={{ fontWeight:800, marginBottom:8 }}>{day}</div>
                        <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
                          {(alternatingByDay[day] || []).length ? [...alternatingByDay[day]].sort((a,b)=>a.name.localeCompare(b.name,'nl')).map(t => <button key={t.id} onClick={() => setAlternateSelections(prev => ({ ...prev, [day]: (prev[day] || []).includes(t.id) ? (prev[day] || []).filter(x => x !== t.id) : [...(prev[day] || []), t.id] }))} style={chipBtn((alternateSelections[day] || []).includes(t.id))}>{memberBadge(t)}{t.name}</button>) : <span style={{ color:'#94a3b8' }}>Geen om-de-week medewerkers op {day.toLowerCase()}.</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div>
                  <div style={{ fontWeight:900, marginBottom:8 }}>Huidige uitval</div>
                  <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                    {absences.length ? sortAbsenceItems(absences, staff).map(abs => {
                      const member = byId(staff, abs.staffId);
                      return <div key={abs.id} style={{ padding:'10px 12px', borderRadius:12, background:'#f8fafc', border:'1px solid #e2e8f0' }}><strong>{memberBadge(member)}{member?.name}</strong> · {abs.day} · {groupOfAbsence(abs, assignments) || abs.group || 'groep onbekend'}</div>;
                    }) : <div style={{ color:'#94a3b8' }}>Nog geen afwezigheden ingevoerd.</div>}
                  </div>
                  {!!impactedGroups.length && <div style={{ marginTop:10, fontSize:13, color:'#64748b' }}>Betrokken groepen: {impactedGroups.join(', ')}</div>}
                </div>
              </div>
            </div>

            {!scenarioOptions.length && (
              <div style={{ ...cardStyle, padding:28, textAlign:'center', color:'#94a3b8' }}>Nog geen opties gegenereerd. Voeg eerst uitval toe en klik daarna hierboven op <b>Genereer planning</b>.</div>
            )}
            <div style={{ display:'grid', gap:16 }}>
              {scenarioOptions.map(option => (
                <div key={option.id} style={{ ...cardStyle, padding:18, border:`2px solid ${option.score >= 85 ? '#86efac' : option.score >= 70 ? '#bfdbfe' : '#fecaca'}` }}>
                  <div style={{ display:'flex', justifyContent:'space-between', gap:12, alignItems:'flex-start', flexWrap:'wrap' }}>
                    <div>
                      <div style={{ display:'flex', gap:8, flexWrap:'wrap', alignItems:'center' }}><div style={{ background:'#e0f2fe', color:'#075985', padding:'4px 8px', borderRadius:999, fontWeight:800, fontSize:12 }}>{option.category}</div><div style={{ fontWeight:900, fontSize:20, color:'#1e3a5f' }}>{option.title}</div></div>
                      <div style={{ color:'#64748b', marginTop:4 }}>{option.desc}</div>
                    </div>
                    <div style={{ display:'flex', gap:10, alignItems:'center', flexWrap:'wrap' }}>
                      <div style={{ background:'#eff6ff', color:'#1d4ed8', fontWeight:900, padding:'8px 10px', borderRadius:12 }}>Score {option.score}</div>
                      <button onClick={() => printScenarioOption(option)} style={{ ...btn, background:'#0f766e', color:'white' }}>🖨️ Print</button><button onClick={() => applyScenario(option)} style={{ ...btn, background:'#16a34a', color:'white' }}>Pas toe</button>
                    </div>
                  </div>
                  <div style={{ display:'grid', gridTemplateColumns:'minmax(260px,1fr) minmax(320px,1.2fr)', gap:16, marginTop:16 }}>
                    <div>
                      <div style={{ fontWeight:900, marginBottom:8 }}>Wat verandert er?</div>
                      {option.changes.length ? option.changes.map((line, i) => <div key={i} style={{ marginBottom:8, padding:'10px 12px', background:'#f8fafc', borderRadius:12, border:'1px solid #e2e8f0' }}>{line}</div>) : <div style={{ color:'#94a3b8' }}>Geen wijzigingen.</div>}
                      <div style={{ fontWeight:900, margin:'14px 0 8px' }}>Let op</div>
                      {option.warnings.length ? option.warnings.map((line, i) => <div key={i} style={{ marginBottom:8, padding:'10px 12px', background:'#fff7ed', color:'#9a3412', borderRadius:12, border:'1px solid #fed7aa' }}>{line}</div>) : <div style={{ color:'#16a34a' }}>Geen waarschuwingen.</div>}
                    </div>
                    <div>
                      <div style={{ fontWeight:900, marginBottom:8 }}>Klein overzicht nieuw rooster</div>
                      <div style={{ overflowX:'auto' }}>
                        <table style={{ width:'100%', borderCollapse:'separate', borderSpacing:'0 8px', minWidth:320 }}>
                          <thead>
                            <tr>
                              <th style={{ textAlign:'left', padding:'6px 8px', color:'#64748b' }}>Groep</th>
                              {DAYS.map(day => <th key={day} style={{ textAlign:'left', padding:'6px 8px', color:'#64748b' }}>{DAY_SHORT[day]}</th>)}
                            </tr>
                          </thead>
                          <tbody>
                            {(impactedGroups.length ? impactedGroups : classes.slice(0,3)).map(group => (
                              <tr key={group}>
                                <td style={{ padding:'6px 8px', fontWeight:800, color:'#1e3a5f' }}>{group}</td>
                                {DAYS.map(day => {
                                  const ids = option.plan[group]?.[day] || [];
                                  return <td key={day} style={{ padding:'6px 8px' }}>
                                    <div style={{ background:'#f8fafc', border:'1px solid #e2e8f0', borderRadius:10, padding:'8px 10px', fontSize:12, minWidth:74 }}>{ids.length ? ids.map(id => { const m = byId(staff,id); return `${memberBadge(m)}${m?.name || 'Onbekend'}`; }).join(', ') : '—'}</div>
                                  </td>;
                                })}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <Modal open={showStaffModal} title={editingStaff?.name ? 'Medewerker bewerken' : 'Nieuwe medewerker'} onClose={() => setShowStaffModal(false)}>
        {editingStaff && (
          <div>
            <div style={{ display:'grid', gap:14 }}>
              <div>
                <label style={{ display:'block', fontWeight:800, marginBottom:6 }}>Naam</label>
                <input value={editingStaff.name} onChange={(e)=>setEditingStaff(prev => ({...prev, name:e.target.value}))} style={input} />
              </div>
              <div>
                <label style={{ display:'block', fontWeight:800, marginBottom:6 }}>Type</label>
                <select value={editingStaff.type} onChange={(e)=>setEditingStaff(prev => ({...prev, type:e.target.value}))} style={input}>
                  <option value="Leerkracht">Leerkracht</option>
                  <option value="Onderwijsassistent">Onderwijsassistent</option>
                  <option value="Invaller">Invaller</option>
                </select>
              </div>
              <div>
                <label style={{ display:'block', fontWeight:800, marginBottom:8 }}>Voorkeur groepen</label>
                <div className="groupgrid" style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))', gap:8 }}>
                  {classes.map(group => (
                    <button key={group} onClick={() => setEditingStaff(prev => ({ ...prev, preferredGroups: prev.preferredGroups.includes(group) ? prev.preferredGroups.filter(g => g !== group) : [...prev.preferredGroups, group] }))} style={chipBtn(editingStaff.preferredGroups.includes(group))}>{group}</button>
                  ))}
                </div>
              </div>
              <div>
                <label style={{ display:'block', fontWeight:800, marginBottom:8 }}>Absoluut niet groepen</label>
                <div className="groupgrid" style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))', gap:8 }}>
                  {classes.map(group => (
                    <button key={group} onClick={() => setEditingStaff(prev => ({ ...prev, excludedGroups: (prev.excludedGroups || []).includes(group) ? (prev.excludedGroups || []).filter(g => g !== group) : [...(prev.excludedGroups || []), group] }))} style={chipBtn((editingStaff.excludedGroups || []).includes(group))}>{group}</button>
                  ))}
                </div>
              </div>
              {editingStaff.type !== 'Invaller' && (
                <div>
                  <label style={{ display:'block', fontWeight:800, marginBottom:8 }}>Werkdagen</label>
                  <div className="daygrid" style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(170px,1fr))', gap:10 }}>
                    {DAYS.map(day => {
                      const state = dayStateFromPattern(editingStaff.workPattern?.[day] || 'none');
                      return (
                      <div key={day} style={{ border:'1px solid #dbe4f0', borderRadius:14, padding:12, background:'#f8fafc' }}>
                        <button type="button" onClick={() => setEditingStaff(prev => ({ ...prev, workPattern: { ...prev.workPattern, [day]: patternFromDayState(!state.enabled, state.alternate) } }))} style={{ ...chipBtn(state.enabled), width:'100%', marginBottom:10, textAlign:'center' }}>{day}</button>
                        <label style={{ display:'flex', alignItems:'center', gap:8, color: state.enabled ? '#334155' : '#94a3b8', fontWeight:700 }}>
                          <input type="checkbox" checked={state.alternate} disabled={!state.enabled} onChange={(e)=>setEditingStaff(prev => ({ ...prev, workPattern: { ...prev.workPattern, [day]: patternFromDayState(state.enabled, e.target.checked) } }))} />
                          Om de week
                        </label>
                      </div>
                    )})}
                  </div>
                </div>
              )}
              <div style={{ display:'flex', justifyContent:'flex-end', gap:10 }}>
                <button onClick={() => setShowStaffModal(false)} style={{ ...btn, background:'#e2e8f0', color:'#334155' }}>Annuleren</button>
                <button onClick={saveStaffItem} style={{ ...btn, background:'#2563eb', color:'white' }}>Opslaan</button>
              </div>
            </div>
          </div>
        )}
      </Modal>

      <Modal open={showGroupModal} title="Groepen bewerken" onClose={() => setShowGroupModal(false)}>
        <div>
          <div style={{ display:'grid', gap:10, marginBottom:16 }}>
            {editingGroups.map((group, i) => (
              <div key={i} style={{ display:'grid', gridTemplateColumns:'1fr auto', gap:10 }}>
                <input value={group} onChange={(e) => setEditingGroups(prev => prev.map((g, idx) => idx === i ? e.target.value : g))} style={input} />
                <button onClick={() => setEditingGroups(prev => prev.filter((_, idx) => idx !== i))} style={{ ...btn, background:'#fee2e2', color:'#991b1b' }}>Verwijder</button>
              </div>
            ))}
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr auto', gap:10, marginBottom:16 }}>
            <input value={newGroupName} onChange={(e)=>setNewGroupName(e.target.value)} placeholder="Nieuwe groep" style={input} />
            <button onClick={() => { if(newGroupName.trim()) { setEditingGroups(prev => [...prev, newGroupName.trim()]); setNewGroupName(''); } }} style={{ ...btn, background:'#e0f2fe', color:'#0369a1' }}>Toevoegen</button>
          </div>
          <div style={{ display:'flex', justifyContent:'flex-end', gap:10 }}>
            <button onClick={() => setShowGroupModal(false)} style={{ ...btn, background:'#e2e8f0', color:'#334155' }}>Annuleren</button>
            <button onClick={saveGroups} style={{ ...btn, background:'#2563eb', color:'white' }}>Opslaan</button>
          </div>
        </div>
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
