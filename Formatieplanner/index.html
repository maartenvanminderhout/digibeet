<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schoolplanner - auto generatie verfijnd</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="margin:0; overflow-x:hidden;">
  <div id="root">
    <div id="startupFallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f4ff;color:#1e3a5f;font-family:Arial,sans-serif;padding:24px;text-align:center;">
      <div style="max-width:560px;background:white;border:1px solid #dbeafe;border-radius:18px;padding:24px;box-shadow:0 16px 40px rgba(30,58,95,.12);">
        <div style="font-size:22px;font-weight:800;margin-bottom:8px;">Schoolplanner laden…</div>
        <div style="font-size:14px;color:#64748b;line-height:1.5;">Als dit blijft staan, is meestal React/Babel of een CDN-script niet geladen. Open dan de browserconsole met F12 voor de exacte melding.</div>
      </div>
    </div>
  </div>
  <script>
    window.__schoolplannerStartup = { startedAt: Date.now() };
    window.addEventListener('error', function(event) {
      window.__schoolplannerStartup.lastError = event.message || 'Onbekende scriptfout';
    });
    setTimeout(function() {
      var root = document.getElementById('root');
      var fallback = document.getElementById('startupFallback');
      if (!root || !fallback) return;
      var hasRenderedApp = root.textContent && !root.textContent.includes('Schoolplanner laden');
      if (!hasRenderedApp) {
        var missing = [];
        if (!window.React) missing.push('React');
        if (!window.ReactDOM) missing.push('ReactDOM');
        if (!window.Babel) missing.push('Babel');
        var msg = missing.length
          ? 'Niet geladen: ' + missing.join(', ') + '. Controleer internet/CDN-blokkade of upload naar echte hosting.'
          : (window.__schoolplannerStartup.lastError || 'De app is niet gestart. Controleer de console voor de exacte fout.');
        fallback.innerHTML = '<div style="max-width:620px;background:white;border:1px solid #fecaca;border-radius:18px;padding:24px;box-shadow:0 16px 40px rgba(30,58,95,.12);"><div style="font-size:22px;font-weight:800;margin-bottom:8px;color:#991b1b;">App start niet</div><div style="font-size:14px;color:#475569;line-height:1.55;">' + msg.replace(/[&<>]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c]; }) + '</div><div style="margin-top:14px;font-size:13px;color:#64748b;">Tip: deze ChatGPT-preview kan externe CDN-scripts blokkeren. Test het bestand via download/upload of op Cloudflare Pages.</div></div>';
      }
    }, 3200);
  </script>
  <script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

const DAYS = ["Maandag", "Dinsdag", "Woensdag", "Donderdag", "Vrijdag"];
const DAY_SHORT = ["Ma", "Di", "Wo", "Do", "Vr"];
const FUNCTIONS = ["Leerkracht", "Onderwijsassistent", "Overig"];

const FUNCTION_ORDER = { Leerkracht: 0, Onderwijsassistent: 1, Overig: 2 };
function sortStaffByFunctionAndName(a, b) {
  const functionDiff = (FUNCTION_ORDER[a?.function] ?? 99) - (FUNCTION_ORDER[b?.function] ?? 99);
  if (functionDiff !== 0) return functionDiff;
  return String(a?.name || "").localeCompare(String(b?.name || ""), "nl", { sensitivity: "base" });
}
function sortStaffByName(a, b) {
  return String(a?.name || "").localeCompare(String(b?.name || ""), "nl", { sensitivity: "base" });
}

const CLASS_COLORS = [
  "#F97316","#EAB308","#22C55E","#06B6D4","#3B82F6","#8B5CF6",
  "#EC4899","#14B8A6","#F43F5E","#84CC16","#F59E0B","#6366F1","#10B981"
];

function generateId() { return Math.random().toString(36).substr(2, 9); }

function getStaffTaskFte(s) {
  if (!s) return 0;
  if (Array.isArray(s.tasks) && s.tasks.length > 0) {
    return s.tasks.reduce((sum, t) => sum + (Number(t.fte) || 0), 0);
  }
  return 0;
}

function getStaffLeaveFte(s) {
  if (!s) return 0;
  if (Array.isArray(s.leaves) && s.leaves.length > 0) {
    return s.leaves.reduce((sum, l) => sum + (Number(l.fte) || 0), 0);
  }
  return 0;
}

function getStaffSpecialFte(s) {
  if (!s) return 0;
  if (Array.isArray(s.specialRegulations) && s.specialRegulations.length > 0) {
    return s.specialRegulations.reduce((sum, r) => sum + (Number(r.fte) || 0), 0);
  }
  return 0;
}

function normalizeStaffMember(s) {
  // Migrate old single-task fields to tasks array
  let tasks = Array.isArray(s?.tasks) ? s.tasks : [];
  if (tasks.length === 0 && ((Number(s?.taskFte) || 0) > 0 || (s?.taskDescription || "").trim())) {
    tasks = [{ id: generateId(), description: s.taskDescription || "", fte: Number(s.taskFte) || 0 }];
  }
  const fixedClasses = Array.isArray(s?.fixedClasses) ? s.fixedClasses : (s?.fixedClass ? [s.fixedClass] : []);
  return {
    ...s,
    preferredDays: Array.isArray(s?.preferredDays) ? s.preferredDays : [],
    preferredClasses: Array.isArray(s?.preferredClasses) ? s.preferredClasses : [],
    fixedClasses: fixedClasses,
    fixedClass: fixedClasses[0] || "",
    fixedDays: Array.isArray(s?.fixedDays) ? s.fixedDays : [],
    autoEnabled: s?.autoEnabled !== false,
    hasTasks: s?.hasTasks === true || tasks.length > 0,
    tasks: tasks,
    leaves: Array.isArray(s?.leaves) ? s.leaves : [],
    specialRegulations: Array.isArray(s?.specialRegulations) ? s.specialRegulations : [],
    notes: s?.notes || "",
    expertGroups: Array.isArray(s?.expertGroups) ? s.expertGroups : [],
    customFunction: s?.customFunction || "",
    workDays: Array.isArray(s?.workDays) ? s.workDays : [],
    desiredFte: (() => {
      const desired = Number(s?.desiredFte);
      const contract = Number(s?.fte) || 0;
      return Number.isFinite(desired) && desired >= 0 && desired <= 1 ? desired : contract;
    })()
  };
}

const DEFAULT_CLASSES = [
  "Groep 1-2a","Groep 1-2b","Groep 1-2c","Groep 3","Groep 4",
  "Groep 5","Groep 6","Groep 7","Groep 8"
];

// Default support FTE requirement per class (0 = no requirement set)
const DEFAULT_SUPPORT_REQ = {};
DEFAULT_CLASSES.forEach(c => { DEFAULT_SUPPORT_REQ[c] = 0; });

const DEFAULT_STAFF = [];

const DEFAULT_FORMATION = {
  name:"Nieuwe planning", staff:DEFAULT_STAFF.map(normalizeStaffMember),
  classes:DEFAULT_CLASSES, assignments:{}, supportReq:DEFAULT_SUPPORT_REQ, expertGroups:[], manualAvailableFte:""
};


// ── Supabase centrale opslag ────────────────────────────────────────────────
// Alleen publieke anon key in frontend. Dit bestand gebruikt één centrale JSONB-state.
const SUPABASE_URL = "https://tgasilapvirxiquqjflv.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnYXNpbGFwdmlyeGlxdXFqZmx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODE3NTksImV4cCI6MjA5NDE1Nzc1OX0.2U8VGYk3CCQ0eiTTzhD2v3ZokEB5BVrJCQ_0NiaE6mc";
const SUPABASE_STATE_TABLE = "schoolplanner_app_state";
const SUPABASE_STATE_ID = "schoolplanner-main-clean-v2";
const SUPABASE_VERSIONS_TABLE = "schoolplanner_app_versions";
const VERSION_INTERVAL_MS = 10 * 60 * 1000; // SharePoint-achtig: niet elke autosave wordt een versie
const MAX_VERSION_HISTORY = 7; // Beperkt bewust: maximaal 7 herstelbare versies om opslag en egress laag te houden

let authAccessToken = "";

function setAuthAccessToken(token) {
  authAccessToken = token || "";
}

function getSupabaseHeaders() {
  return {
    apikey: SUPABASE_ANON_KEY,
    Authorization: `Bearer ${authAccessToken || SUPABASE_ANON_KEY}`,
    "Content-Type": "application/json"
  };
}

function normalizePlannerState(raw) {
  const parsed = raw && typeof raw === "object" ? raw : {};
  const storedFormations = Array.isArray(parsed.savedFormations) && parsed.savedFormations.length
    ? parsed.savedFormations.map(f => ({
        ...f,
        staff: (f.staff || DEFAULT_STAFF).map(normalizeStaffMember),
        classes: f.classes || DEFAULT_CLASSES,
        assignments: f.assignments || {},
        supportReq: f.supportReq || {},
        expertGroups: Array.isArray(f.expertGroups) ? f.expertGroups : [],
        manualAvailableFte: f.manualAvailableFte ?? ""
      }))
    : [DEFAULT_FORMATION];

  const rawIdx = Number(parsed.activeIdx);
  const safeIdx = Number.isFinite(rawIdx) && rawIdx >= 0
    ? Math.min(rawIdx, storedFormations.length - 1)
    : 0;
  const current = storedFormations[safeIdx] || storedFormations[0] || DEFAULT_FORMATION;

  return {
    savedFormations: storedFormations,
    activeIdx: safeIdx,
    formationName: parsed.formationName || current?.name || "Nieuwe planning",
    staff: ((parsed.staff || current?.staff || DEFAULT_STAFF)).map(normalizeStaffMember),
    classes: parsed.classes || current?.classes || DEFAULT_CLASSES,
    assignments: parsed.assignments || current?.assignments || {},
    supportReq: parsed.supportReq || current?.supportReq || {},
    expertGroups: Array.isArray(parsed.expertGroups) ? parsed.expertGroups : (current?.expertGroups || []),
    manualAvailableFte: String(parsed.manualAvailableFte ?? current?.manualAvailableFte ?? "")
  };
}

// ── Shared styles ────────────────────────────────────────────────────────────
const labelStyle = { display:"block", fontSize:13, fontWeight:700, color:"#374151", marginBottom:8 };
const inputStyle  = { width:"100%", padding:"10px 14px", borderRadius:8, border:"1.5px solid #CBD5E1", fontFamily:"Outfit", fontSize:15, color:"#1E293B" };
const btnPrimary  = { padding:"12px 24px", borderRadius:10, border:"none", background:"linear-gradient(135deg,#2563EB,#1D4ED8)", color:"white", cursor:"pointer", fontFamily:"Outfit", fontSize:15, fontWeight:700, boxShadow:"0 4px 12px rgba(37,99,235,0.3)" };

// ── Modal wrapper ────────────────────────────────────────────────────────────
function Modal({ children, onClose, wide, extraWide }) {
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}
      onClick={e => { if (e.target===e.currentTarget) onClose(); }}>
      <div style={{ background:"white", borderRadius:20, padding:(typeof window !== "undefined" && window.innerWidth <= 768)?16:32, width:"100%", maxWidth: (typeof window !== "undefined" && window.innerWidth <= 768) ? "calc(100vw - 24px)" : (extraWide ? 900 : wide ? 640 : 520), maxHeight:"90vh", overflowY:"auto", boxShadow:"0 20px 60px rgba(0,0,0,0.2)", animation:"fadeIn 0.2s ease" }}>
        {children}
      </div>
    </div>
  );
}

// ── Global helpers (needed by PlannerCell) ──────────────────────────────────
const getFixedClassesGlobal = (person) => Array.isArray(person?.fixedClasses) ? person.fixedClasses : (person?.fixedClass ? [person.fixedClass] : []);
const hasFixedClassGlobal = (person, cls) => getFixedClassesGlobal(person).includes(cls);

// ── Planner cell ─────────────────────────────────────────────────────────────
function PlannerCell({ cls, day, teachers = [], assistants = [], supporters = [], allStaff, onToggle, getFteRemain, getFteUsed, getDayAssignmentsForStaff, getConflictingDayAssignmentsForStaff, onToggleTeacherDay, onToggleSupportDay, onSetWholeSupportDay, onSupportSlotChangeForDay, assignments, supportCell, onSupportSlotChange }) {
  const [open, setOpen] = useState(false);
  const isMobile = typeof window !== "undefined" ? window.innerWidth <= 768 : false;
  const [selectedAssistantDays, setSelectedAssistantDays] = useState({});
  const [selectedSupportDays, setSelectedSupportDays] = useState({});
  const sortPeopleByName = (items = []) => [...items].sort(sortStaffByName);
  const displayTeachers = useMemo(() => sortPeopleByName(teachers || []), [teachers]);
  const displayAssistants = useMemo(() => sortPeopleByName(assistants || []), [assistants]);
  const displaySupporters = useMemo(() => sortPeopleByName(supporters || []), [supporters]);
  const has = displayTeachers.length > 0 || displayAssistants.length > 0 || displaySupporters.length > 0;

  const formatRemain = (value) => `${(Math.round((value || 0) * 100) / 100).toFixed(2)} fte over`;

  const getCellSlot = (staffId) => {
    const slots = supportCell?.supportSlots || {};
    if (slots[staffId]) return slots[staffId];
    return { am: true, pm: true };
  };
  const getDayCellSlot = (dayCell, staffId) => {
    const slots = dayCell?.supportSlots || {};
    if (slots[staffId]) return slots[staffId];
    return { am: true, pm: true };
  };
  const slotFte = (slot) => ((slot?.am?0.1:0)+(slot?.pm?0.1:0))||0;
  const slotLabel = (slot) => {
    if (slot?.am && slot?.pm) return "0.20";
    if (slot?.am) return "O";
    if (slot?.pm) return "M";
    return "—";
  };
  const getSelectedAssistantDay = (staffId, assistantDaysForClass) => {
    const preferred = selectedAssistantDays[staffId];
    return assistantDaysForClass.includes(preferred) ? preferred : (assistantDaysForClass[0] || null);
  };
  const getSelectedSupportDay = (staffId, supportDaysForClass) => {
    const preferred = selectedSupportDays[staffId];
    return supportDaysForClass.includes(preferred) ? preferred : (supportDaysForClass[0] || null);
  };
  const getDayMeta = (person, currentDay) => {
    const fixed = (person?.fixedDays || []).includes(currentDay);
    const preferred = (person?.preferredDays || []).includes(currentDay);
    return {
      fixed,
      preferred,
      label: fixed ? "Vaste dag" : preferred ? "Voorkeurdag" : "Geen dagvoorkeur"
    };
  };
  const renderPreferenceBadges = (person) => {
    const preferredDays = person?.preferredDays || [];
    const fixedDays = person?.fixedDays || [];
    const hasAny = fixedDays.length > 0 || preferredDays.length > 0;
    if (!hasAny) {
      return <div style={{ fontSize:10, color:"#94A3B8", marginTop:4 }}>Geen ingestelde werkdagen of vaste dagen</div>;
    }
    return (
      <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:4 }}>
        {fixedDays.length > 0 && <span style={{ fontSize:10, fontWeight:700, color:"#991B1B", background:"#FEE2E2", borderRadius:999, padding:"2px 8px" }}>Vast: {fixedDays.map(d => DAY_SHORT[DAYS.indexOf(d)]).join(", ")}</span>}
        {preferredDays.length > 0 && <span style={{ fontSize:10, fontWeight:700, color:"#166534", background:"#DCFCE7", borderRadius:999, padding:"2px 8px" }}>Voorkeur: {preferredDays.map(d => DAY_SHORT[DAYS.indexOf(d)]).join(", ")}</span>}
      </div>
    );
  };
  const teacherOptions = useMemo(() => {
    return allStaff
      .filter(s => s.function === "Leerkracht")
      .map(s => ({
        ...s,
        remain: getFteRemain(s.id),
        used: getFteUsed(s.id),
        desiredGap: (Number((s.desiredFte ?? s.fte) || 0) - getFteUsed(s.id)),
        prefersClass: (s.preferredClasses || []).includes(cls),
        prefersDay: (s.preferredDays || []).includes(day)
      }))
      .sort((a, b) => sortStaffByName(a, b));
  }, [allStaff, cls, day, getFteRemain, getFteUsed]);

  const supportOptions = useMemo(() => {
    return allStaff
      .filter(s => s.function !== "Onderwijsassistent" && s.function !== "Overig")
      .map(s => ({
        ...s,
        remain: getFteRemain(s.id),
        desiredGap: (Number((s.desiredFte ?? s.fte) || 0) - getFteUsed(s.id)),
        prefersClass: (s.preferredClasses || []).includes(cls),
      }))
      .sort((a, b) => sortStaffByName(a, b));
  }, [allStaff, cls, getFteRemain]);

  const assistantOptions = useMemo(() => {
    return allStaff
      .filter(s => s.function === "Onderwijsassistent")
      .map(s => ({
        ...s,
        remain: getFteRemain(s.id),
        desiredGap: (Number((s.desiredFte ?? s.fte) || 0) - getFteUsed(s.id)),
        prefersClass: (s.preferredClasses || []).includes(cls),
      }))
      .sort((a, b) => sortStaffByName(a, b));
  }, [allStaff, cls, getFteRemain]);

  return (
    <div style={{ position:"relative" }}>
      <div onClick={() => setOpen(!open)} style={{ minHeight:68, borderRadius:10, padding:"8px 10px", background: has ? "#F0F9FF" : "#F8FAFC", border:`1.5px solid ${has ? "#BAE6FD" : "#E2E8F0"}`, cursor:"pointer", transition:"all 0.15s" }}
        onMouseEnter={e => { e.currentTarget.style.borderColor="#2563EB"; e.currentTarget.style.background="#EFF6FF"; }}
        onMouseLeave={e => { e.currentTarget.style.borderColor=has?"#BAE6FD":"#E2E8F0"; e.currentTarget.style.background=has?"#F0F9FF":"#F8FAFC"; }}>
        {!has && <div style={{ color:"#CBD5E1", fontSize:11, textAlign:"center", paddingTop:14 }}>+ Toevoegen</div>}
        {displayTeachers.map(t => {
          const dupes = getConflictingDayAssignmentsForStaff ? getConflictingDayAssignmentsForStaff(t.id, day, cls, { role: "Leerkracht" }) : [];
          return <div key={t.id} style={{ fontSize:11, fontWeight:600, color: dupes.length > 0 ? "#B91C1C" : "#1D4ED8", background: dupes.length > 0 ? "#FEE2E2" : "#DBEAFE", borderRadius:4, padding:"2px 6px", marginBottom:2 }} title={dupes.length > 0 ? `Ook ingepland: ${dupes.map(d => d.cls).join(", ")}` : ""}>👩‍🏫 {t.name}{dupes.length > 0 ? " ⚠️" : ""}</div>;
        })}
        {displayAssistants.map(a => {
          const dupes = getConflictingDayAssignmentsForStaff ? getConflictingDayAssignmentsForStaff(a.id, day, cls, { role: "Onderwijsassistent", slot: getCellSlot(a.id) }) : [];
          const sl = getCellSlot(a.id);
          return <div key={a.id} style={{ fontSize:11, fontWeight:600, color: dupes.length > 0 ? "#B91C1C" : "#92400E", background: dupes.length > 0 ? "#FEE2E2" : "#FEF3C7", borderRadius:4, padding:"2px 6px", marginBottom:2 }} title={dupes.length > 0 ? `Ook ingepland: ${dupes.map(d => d.cls).join(", ")}` : ""}>🤝 {a.name} <span style={{ fontSize:9, opacity:0.8 }}>{slotLabel(sl)}</span>{dupes.length > 0 ? " ⚠️" : ""}</div>;
        })}
        {displaySupporters.map(s => {
          const dupes = getConflictingDayAssignmentsForStaff ? getConflictingDayAssignmentsForStaff(s.id, day, cls, { role: "Ondersteuning", slot: getCellSlot(s.id) }) : [];
          const sl = getCellSlot(s.id);
          return <div key={s.id} style={{ fontSize:11, fontWeight:600, color: dupes.length > 0 ? "#B91C1C" : "#6B21A8", background: dupes.length > 0 ? "#FEE2E2" : "#F3E8FF", borderRadius:4, padding:"2px 6px", marginBottom:2 }} title={dupes.length > 0 ? `Ook ingepland: ${dupes.map(d => d.cls).join(", ")}` : ""}>🧩 {s.name} <span style={{ fontSize:9, opacity:0.8 }}>{slotLabel(sl)}</span>{dupes.length > 0 ? " ⚠️" : ""}</div>;
        })}
      </div>
      {open && (
        <>
          <div style={{ position:"fixed", inset:0, zIndex:1000, background:"rgba(15,23,42,0.18)" }} onClick={() => setOpen(false)} />
          <div style={{ position:"fixed", left:"50%", top:"50%", transform:"translate(-50%, -50%)", zIndex:1100, background:"white", borderRadius:16, boxShadow:"0 24px 60px rgba(0,0,0,0.2)", border:"1px solid #E2E8F0", padding:isMobile?12:16, width:isMobile?"calc(100vw - 24px)":"min(92vw, 560px)", maxHeight:"82vh", overflowY:"auto" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:12, marginBottom:10 }}>
              <div>
                <div style={{ fontSize:15, fontWeight:800, color:"#1E3A5F" }}>{cls} — {day}</div>
                <div style={{ fontSize:12, color:"#64748B", marginTop:2 }}>Handmatig invullen · voorkeursdocenten staan bovenaan in groen</div>
              </div>
              <button onClick={() => setOpen(false)} style={{ border:"none", background:"#F1F5F9", color:"#334155", borderRadius:999, width:32, height:32, cursor:"pointer", fontWeight:700 }}>✕</button>
            </div>

            <div style={{ fontSize:11, color:"#94A3B8", fontWeight:700, marginBottom:6 }}>LEERKRACHTEN — klik om aan/uit te zetten, gebruik dagknoppen om meerdere dagen in te stellen</div>
            <div style={{ display:"flex", flexDirection:"column", gap:4, marginBottom:12 }}>
              {teacherOptions.map(s => {
                const on = teachers.some(t => t.id===s.id);
                const green = s.prefersClass;
                const sameDayAssignments = getConflictingDayAssignmentsForStaff ? getConflictingDayAssignmentsForStaff(s.id, day, cls, { role: "Leerkracht" }) : [];
                const alreadyWorkingToday = sameDayAssignments.length > 0;
                // Get which days this teacher is assigned for this class
                const clsAssign = assignments ? (assignments[cls] || {}) : {};
                const teacherDaysForClass = DAYS.filter(d => ((clsAssign[d] || {}).teachers || []).includes(s.id));
                return (
                  <div key={s.id} style={{ borderRadius:10, border:`1px solid ${green ? "#BBF7D0" : on ? "#BFDBFE" : "#E2E8F0"}`, background: on ? "#EFF6FF" : green ? "#F0FDF4" : "white", overflow:"hidden" }}>
                    <div onClick={() => onToggle(s.id,"teachers")} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 10px", cursor:"pointer" }}>
                      <span>{on?"✅":"⬜"}</span>
                      <div style={{ display:"flex", flexDirection:"column", minWidth:0 }}>
                        <span style={{ fontSize:13, fontWeight:700, color: green ? "#166534" : on ? "#2563EB" : "#374151" }}>
                          👩‍🏫 {s.name} {alreadyWorkingToday ? "⚠️" : ""}
                        </span>
                        <span style={{ fontSize:11, color: alreadyWorkingToday ? "#DC2626" : (green ? "#15803D" : "#94A3B8") }}>
                          {alreadyWorkingToday
                            ? `Werkt al op ${day}: ${sameDayAssignments.map(item => `${item.cls} (${item.role})`).join(", ")}`
                            : ((s.fixedDays || []).includes(day) ? `Vaste dag ${day}` : (hasFixedClassGlobal(s, cls) ? `Vaste groep ${cls}` : (s.prefersClass ? `Voorkeur voor ${cls}` : (s.prefersDay ? `Beschikbaar op ${day}` : "Geen klasvoorkeur opgegeven"))))}
                        </span>
                        {renderPreferenceBadges(s)}
                        {Math.abs(s.desiredGap) > 0.001 && <span style={{ fontSize:11, color:s.desiredGap > 0 ? "#166534" : "#B45309", fontWeight:700 }}>{s.desiredGap > 0 ? `Wil nog +${s.desiredGap.toFixed(2)} FTE meer werken` : `Zit ${Math.abs(s.desiredGap).toFixed(2)} FTE boven wens`}</span>}
                      </div>
                      <div style={{ marginLeft:"auto", textAlign:"right", flexShrink:0 }}>

// ── FTE pill helper ───────────────────────────────────────────────────────────
function FtePill({ value, target, label }) {
  const ok = value >= target - 0.001;
  return (
    <div style={{ display:"inline-flex", alignItems:"center", gap:6, background: ok?"#DCFCE7":"#FEE2E2", borderRadius:20, padding:"4px 12px" }}>
      <span style={{ fontSize:13, fontWeight:700, color: ok?"#166534":"#991B1B" }}>{ok?"✓":"✗"}</span>
      <span style={{ fontSize:13, fontWeight:700, color: ok?"#166534":"#991B1B" }}>{value.toFixed(2)} / {target.toFixed(2)} FTE {label}</span>
    </div>
  );
}


function DonutFteChart({ used, total, size = 150 }) {
  const safeUsed = Math.max(0, Number(used) || 0);
  const safeTotal = Math.max(0, Number(total) || 0);
  const percent = safeTotal > 0 ? (safeUsed / safeTotal) * 100 : 0;
  const ringRatio = safeTotal > 0 ? Math.min(safeUsed / safeTotal, 1) : 0;
  const isOver = percent > 100.001;
  const radius = size * 0.34;
  const stroke = Math.max(12, Math.round(size * 0.12));
  const circumference = 2 * Math.PI * radius;
  const usedOffset = circumference * (1 - ringRatio);
  const center = size / 2;

  return (
    <div style={{ position:"relative", width:size, height:size, flexShrink:0 }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle
          cx={center}
          cy={center}
          r={radius}
          fill="none"
          stroke={isOver ? "#FECACA" : "#E2E8F0"}
          strokeWidth={stroke}
        />
        <circle
          cx={center}
          cy={center}
          r={radius}
          fill="none"
          stroke={isOver ? "#DC2626" : "#2563EB"}
          strokeWidth={stroke}
          strokeLinecap="round"
          strokeDasharray={circumference}
          strokeDashoffset={usedOffset}
          transform={`rotate(-90 ${center} ${center})`}
        />
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", textAlign:"center", padding:"0 10px" }}>
        <div style={{ fontSize: size < 140 ? 24 : 28, fontWeight:800, color:isOver ? "#B91C1C" : "#1E3A5F", lineHeight:1 }}>{Math.round(percent)}%</div>
        <div style={{ fontSize:11, fontWeight:700, color:"#64748B", marginTop:2 }}>ingezet</div>
        {isOver && <div style={{ fontSize:10, fontWeight:800, color:"#B91C1C", marginTop:4 }}>boven 100%</div>}
      </div>
    </div>
  );
}

  const getNextVersionNumber = async () => {
    const url = `${SUPABASE_URL}/rest/v1/${SUPABASE_VERSIONS_TABLE}?state_id=eq.${encodeURIComponent(SUPABASE_STATE_ID)}&select=version_number&order=version_number.desc&limit=1`;
    const response = await fetch(url, { headers: getSupabaseHeaders() });
    if (!response.ok) throw new Error(`Laatste versienummer ophalen mislukt (${response.status})`);
    const rows = await response.json();
    const latest = Array.isArray(rows) && rows[0] ? Number(rows[0].version_number) : 0;
    return (Number.isFinite(latest) ? latest : 0) + 1;
  };

  const pruneSupabaseVersions = async () => {
    try {
      const url = `${SUPABASE_URL}/rest/v1/${SUPABASE_VERSIONS_TABLE}?state_id=eq.${encodeURIComponent(SUPABASE_STATE_ID)}&select=id,version_number&order=version_number.desc&limit=200`;
      const response = await fetch(url, { headers: getSupabaseHeaders() });
      if (!response.ok) throw new Error(`Versies ophalen voor opschonen mislukt (${response.status})`);
      const rows = await response.json();
      const oldRows = Array.isArray(rows) ? rows.slice(MAX_VERSION_HISTORY) : [];
      for (const row of oldRows) {
        await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_VERSIONS_TABLE}?id=eq.${encodeURIComponent(row.id)}`, {
          method: "DELETE",
          headers: getSupabaseHeaders()
        });
      }
    } catch (error) {
      console.warn("Oude versies konden niet automatisch worden opgeschoond", error);

  };

  const createSupabaseVersion = async (state, label = "Automatische versie") => {
    const normalized = normalizePlannerState(state || buildCurrentPlannerState());
    const versionNumber = await getNextVersionNumber();
    const payload = {
      state_id: SUPABASE_STATE_ID,
      version_number: versionNumber,
      label,
      data: normalized
    };
    const response = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_VERSIONS_TABLE}`, {
      method: "POST",
      headers: { ...getSupabaseHeaders(), Prefer: "return=representation" },
      body: JSON.stringify(payload)
    });
    if (!response.ok) throw new Error(`Versie opslaan mislukt (${response.status})`);
    lastVersionAtRef.current = Date.now();
    await pruneSupabaseVersions();
    return versionNumber;

  const saveSupabaseState = async (state, { silent = false, versionMode = "none", versionLabel = "Handmatig opgeslagen" } = {}) => {
    const normalized = normalizePlannerState(state || buildCurrentPlannerState());
    const payload = {
      id: SUPABASE_STATE_ID,
      name: normalized.formationName || "Schoolplanner",
      data: normalized,
      updated_at: new Date().toISOString()
    };

    try {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_STATE_TABLE}`, {
        method: "POST",
        headers: { ...getSupabaseHeaders(), Prefer: "resolution=merge-duplicates,return=representation" },
        body: JSON.stringify(payload)
      });
      if (!response.ok) throw new Error(`Supabase opslaan mislukt (${response.status})`);

      const shouldCreatePeriodicVersion = versionMode === "periodic" && (!lastVersionAtRef.current || Date.now() - lastVersionAtRef.current > VERSION_INTERVAL_MS);
      if (versionMode === "manual" || versionMode === "restore" || shouldCreatePeriodicVersion) {
        const label = versionMode === "periodic" ? `Automatische versie · ${normalized.formationName || "Planning"}` : versionLabel;

      const response = await fetch(url, { headers: getSupabaseHeaders() });
      if (!response.ok) throw new Error(`Versie ophalen mislukt (${response.status})`);

  // ── Helpers ────────────────────────────────────────────────────────────────
  const getStaffById = id => staff.find(s => s.id===id);

  const getFixedClasses = (person) => Array.isArray(person?.fixedClasses) ? person.fixedClasses : (person?.fixedClass ? [person.fixedClass] : []);
  const hasFixedClass = (person, cls) => getFixedClasses(person).includes(cls);

  const getTeacherLoadForCell = (cell, staffId) => {
    const teachersInCell = cell?.teachers || [];
    if (!teachersInCell.includes(staffId)) return 0;
    return teachersInCell.length >= 2 ? 0.1 : 0.2;
  };

  const getSupportSlot = (cell, staffId) => {
    const slots = (cell?.supportSlots || {});
    if (slots[staffId]) return slots[staffId];
    // Backward compat: if old supportFte exists, derive slots
    const oldFte = (cell?.supportFte || {})[staffId];
    if (oldFte !== undefined) {
      const v = Number(String(oldFte).replace(',','.'));
      if (v <= 0.1 + 0.001) return { am: true, pm: false };
      return { am: true, pm: true };
    }
    return { am: true, pm: true }; // default: hele dag
  };

  const getSupportFteFromSlot = (slot) => {
    if (!slot) return 0.2;
    return ((slot.am ? 0.1 : 0) + (slot.pm ? 0.1 : 0)) || 0;
  };

  const getSupportLoadForCell = (cell, staffId) => {
    const assigned = (cell?.assistants || []).includes(staffId) || (cell?.supporters || []).includes(staffId);
    if (!assigned) return 0;
    return getSupportFteFromSlot(getSupportSlot(cell, staffId));
  };

  const getSupportSlotLabel = (slot) => {
    if (!slot) return "Hele dag";
    if (slot.am && slot.pm) return "Hele dag";
    if (slot.am) return "Ochtend";
    if (slot.pm) return "Middag";
    return "—";
  };

  const getSupportSlotShort = (slot) => {
    if (!slot) return "0.20";
    if (slot.am && slot.pm) return "0.20";
    if (slot.am) return "O 0.10";
    if (slot.pm) return "M 0.10";
    return "—";
  };

  const getFteUsed = staffId => {
    let used = 0;
    Object.values(assignments).forEach(clsObj => {
      DAYS.forEach(day => {
        const cell = clsObj?.[day] || { teachers: [], assistants: [], supporters: [] };
        used += getTeacherLoadForCell(cell, staffId);
        used += getSupportLoadForCell(cell, staffId);
      });
    });
    return used;
  };

  const getEffectiveFte = staffId => {
    const s = staff.find(x => x.id === staffId);

    return Math.max(0, (s.fte || 0) - getStaffTaskFte(s) - getStaffLeaveFte(s) - getStaffSpecialFte(s));
  };

  const getFteRemain  = staffId => Math.max(0, getEffectiveFte(staffId) - getFteUsed(staffId));
  const getFteBalance = staffId => getEffectiveFte(staffId) - getFteUsed(staffId);

  const supportSlotsOverlap = (slotA, slotB) => {

  const assignmentItemsConflict = (currentItem, otherItem) => {

    const otherIsSupport = otherItem.role === "Onderwijsassistent" || otherItem.role === "Ondersteuning";
    if (!currentIsSupport || !otherIsSupport) return true;
    return supportSlotsOverlap(currentItem.slot, otherItem.slot);
  };

  const getDayAssignmentsForStaff = (staffId, day, excludeCls = null) => {

      if ((cell.assistants || []).includes(staffId)) items.push({ cls, role: "Onderwijsassistent", slot: getSupportSlot(cell, staffId) });
      if ((cell.supporters || []).includes(staffId)) items.push({ cls, role: "Ondersteuning", slot: getSupportSlot(cell, staffId) });
    });
    return items;

  const remainingSupportCandidates = getGroupedSortedStaff(partialStaff);
  const overplannedStaff = getGroupedSortedStaff(staff
    .filter(s => s.function !== "Overig" && getFteBalance(s.id) < -0.001));


  const escapeHtml = (value) => String(value ?? "")
    .replace(/&/g, "&amp;")

  const formatFte = (value) => (Math.round((value || 0) * 100) / 100).toFixed(2);
  const parseFteValue = (raw, min = 0, max = 1) => {

  const textNumberInputProps = {

  };
  const getDesiredFte = (person) => {

  const getStaffSchedule = (staffId) => {

    classes.forEach(cls => {

  const buildStaffReasonLines = (person) => {
    const schedule = getStaffSchedule(person.id);
    const assignedDays = [...new Set(schedule.map(item => item.day))];
    const assignedClasses = [...new Set(schedule.map(item => item.cls))];
    const preferredDayMatches = assignedDays.filter(day => person.preferredDays.includes(day));
    const preferredClassMatches = assignedClasses.filter(cls => person.preferredClasses.includes(cls));
    const supportMoments = schedule.filter(item => item.role !== "Leerkracht").length;
    const used = getFteUsed(person.id);
    const remain = Math.max(0, person.fte - used);
    const reasons = [];

    if (getFixedClasses(person).length > 0) {
      reasons.push(`Niet-onderhandelbare groep(en) ingesteld: ${getFixedClasses(person).join(", ")}.`);
    }

    if ((person.fixedDays || []).length > 0) {
      reasons.push(`Niet-onderhandelbare dagen ingesteld: ${person.fixedDays.map(d => DAY_SHORT[DAYS.indexOf(d)]).join(", ")}.`);

    if (preferredClassMatches.length > 0) {
      reasons.push(`Ingezet in voorkeursgroep(en): ${preferredClassMatches.join(", ")}.`);
    } else if (assignedClasses.length > 0) {
      reasons.push(`Ingezet in ${assignedClasses.length === 1 ? "één vaste groep" : "meerdere groepen"}: ${assignedClasses.join(", ")}.`);

  // ── Toggle assignment ──────────────────────────────────────────────────────
  const toggleAssignment = (cls, day, staffId, type) => {
    updateAssignmentsWithHistory(prev => {
      const a = JSON.parse(JSON.stringify(prev));
      if (!a[cls]) a[cls]={};
      if (!a[cls][day]) a[cls][day]={teachers:[],assistants:[],supporters:[]};
      const list = a[cls][day][type]||[];

      if (type === "teachers") {
        const isRemoving = list.includes(staffId);
        // No limit for manual input - auto-generate keeps the 2-per-class limit
      }

      a[cls][day][type] = list.includes(staffId) ? list.filter(x=>x!==staffId) : [...list,staffId];
      return a;
    });
  };

  const toggleTeacherForDay = (cls, targetDay, staffId) => {
    updateAssignmentsWithHistory(prev => {
      const a = JSON.parse(JSON.stringify(prev));
      if (!a[cls]) a[cls] = {};
      if (!a[cls][targetDay]) a[cls][targetDay] = { teachers: [], assistants: [], supporters: [] };
      const list = a[cls][targetDay].teachers || [];
      a[cls][targetDay].teachers = list.includes(staffId) ? list.filter(x => x !== staffId) : [...list, staffId];
      return a;
    });
  };

  const toggleSupportFromOverview = (cls, day, staffId) => {
    const member = getStaffById(staffId);
    const targetType = member?.function === "Onderwijsassistent" ? "assistants" : "supporters";
    updateAssignmentsWithHistory(prev => {
      const a = JSON.parse(JSON.stringify(prev));
      if (!a[cls]) a[cls] = {};
      if (!a[cls][day]) a[cls][day] = { teachers: [], assistants: [], supporters: [], supportSlots: {} };
      const cell = a[cls][day];
      cell.assistants = cell.assistants || [];
      cell.supporters = cell.supporters || [];
      cell.supportSlots = cell.supportSlots || {};
      const alreadyOn = (cell[targetType] || []).includes(staffId);
      cell.assistants = cell.assistants.filter(x => x !== staffId);
      cell.supporters = cell.supporters.filter(x => x !== staffId);
      delete cell.supportSlots[staffId];
      if (!alreadyOn) {
        cell[targetType] = [...cell[targetType], staffId];
        cell.supportSlots[staffId] = { am: true, pm: true };
      }
      return a;
    });
  };

  const toggleSupportForDay = (cls, targetDay, staffId, targetType, slotKey) => {
    updateAssignmentsWithHistory(prev => {
      const a = JSON.parse(JSON.stringify(prev));
      if (!a[cls]) a[cls] = {};
      if (!a[cls][targetDay]) a[cls][targetDay] = { teachers: [], assistants: [], supporters: [], supportSlots: {} };
      const cell = a[cls][targetDay];
      cell.assistants = cell.assistants || [];
      cell.supporters = cell.supporters || [];
      cell.supportSlots = cell.supportSlots || {};
      const otherType = targetType === "assistants" ? "supporters" : "assistants";
      cell[otherType] = (cell[otherType] || []).filter(x => x !== staffId);
      const isAssigned = (cell[targetType] || []).includes(staffId);
      const currentSlot = isAssigned ? getSupportSlot(cell, staffId) : { am: false, pm: false };
      const nextSlot = { ...currentSlot, [slotKey]: !currentSlot[slotKey] };

      cell[targetType] = (cell[targetType] || []).filter(x => x !== staffId);
      delete cell.supportSlots[staffId];

      if (nextSlot.am || nextSlot.pm) {
        cell[targetType] = [...cell[targetType], staffId];
        cell.supportSlots[staffId] = nextSlot;
      }
      return a;
    });
  };

  const setSupportSlotForCell = (cls, day, staffId, slot) => {
    updateAssignmentsWithHistory(prev => {
      const a = JSON.parse(JSON.stringify(prev));
      if (!a[cls]) a[cls] = {};
      if (!a[cls][day]) a[cls][day] = { teachers: [], assistants: [], supporters: [], supportSlots: {} };
      const cell = a[cls][day];
      cell.assistants = cell.assistants || [];
      cell.supporters = cell.supporters || [];
      cell.supportSlots = cell.supportSlots || {};
      const targetType = (cell.assistants || []).includes(staffId)
        ? "assistants"
        : ((cell.supporters || []).includes(staffId) ? "supporters" : null);
      if (!targetType) return a;
      if (!slot.am && !slot.pm) {
        cell[targetType] = (cell[targetType] || []).filter(x => x !== staffId);
        delete cell.supportSlots[staffId];
        return a;
      }
      cell.supportSlots[staffId] = { am: !!slot.am, pm: !!slot.pm };
      return a;
    });
  };

  const setWholeSupportDay = (cls, targetDay, staffId, targetType, isOn) => {
    updateAssignmentsWithHistory(prev => {
      const a = JSON.parse(JSON.stringify(prev));
      if (!a[cls]) a[cls] = {};
      if (!a[cls][targetDay]) a[cls][targetDay] = { teachers: [], assistants: [], supporters: [], supportSlots: {} };
      const cell = a[cls][targetDay];
      cell.assistants = cell.assistants || [];
      cell.supporters = cell.supporters || [];
      cell.supportSlots = cell.supportSlots || {};
      const otherType = targetType === "assistants" ? "supporters" : "assistants";
      cell[targetType] = (cell[targetType] || []).filter(x => x !== staffId);
      cell[otherType] = (cell[otherType] || []).filter(x => x !== staffId);
      delete cell.supportSlots[staffId];
      if (isOn) {
        cell[targetType] = [...cell[targetType], staffId];
        cell.supportSlots[staffId] = { am: true, pm: true };
      }
      return a;
    });

  const setSupportSlotForSpecificDay = (cls, targetDay, staffId, slot) => {

  // ── Auto-generate ──────────────────────────────────────────────────────────

  const autoGenerate = (opts) => {
    const options = opts || autoOptions;
    const maxT = options.maxTeachersPerClass || 2;
    const result = {};
    if (options.clearExisting) {
      classes.forEach(cls => {
        result[cls] = {};
        DAYS.forEach(day => { result[cls][day] = { teachers: [], assistants: [], supporters: [] }; });
      });
    } else {
      classes.forEach(cls => {
        result[cls] = {};
        DAYS.forEach(day => {
          const existing = (assignments[cls] || {})[day] || { teachers: [], assistants: [], supporters: [] };
          result[cls][day] = JSON.parse(JSON.stringify(existing));
          if (options.mode === "teachers") { /* keep existing support */ }
          if (options.mode === "support") { result[cls][day].teachers = [...(existing.teachers || [])]; }
        });
      });
    }

    if (options.mode === "teachers" || options.mode === "both") {

      const teachers = staff
        .filter(s => s.function === "Leerkracht" && s.autoEnabled !== false)
        .map(normalizeStaffMember);

      const budgets = {};
      const dailyBusy = {};

      const getTeacherById = id => teachers.find(t => t.id === id);

      const getTeacherUnitsFromCell = (cell, teacherId) => {
        const ids = cell?.teachers || [];
        if (!ids.includes(teacherId)) return 0;
        return ids.length >= 2 ? 1 : 2;
      };

      const getTeacherLoadFromResult = (teacherId) => {
        let total = 0;
        classes.forEach(cls => {
          DAYS.forEach(day => {
            const cell = result[cls]?.[day] || {};
            total += getTeacherUnitsFromCell(cell, teacherId);
          });
        });
        return total;
      };

      teachers.forEach(t => {
        const effectiveUnits = Math.round(Math.max(0, ((t.fte || 0) - getStaffTaskFte(t) - getStaffLeaveFte(t) - getStaffSpecialFte(t))) * 10);
        const usedUnits = getTeacherLoadFromResult(t.id);
        budgets[t.id] = Math.max(0, effectiveUnits - usedUnits);
        dailyBusy[t.id] = new Set();
      });

      classes.forEach(cls => {
        DAYS.forEach(day => {
          const cell = result[cls]?.[day] || {};
          (cell.teachers || []).forEach(id => {
            if (dailyBusy[id]) dailyBusy[id].add(day);
          });
        });
      });

      const isTeacherPreferredForDay = (teacher, day) => {
        if (!teacher) return false;
        if (!teacher.preferredDays?.length) return true;
        return teacher.preferredDays.includes(day);
      };

      const isTeacherFixedForDay = (teacher, day) => {
        if (!teacher) return false;
        return (teacher.fixedDays || []).includes(day);
      };

      const isTeacherAllowedByWorkDays = (teacher, day) => {
        if (!teacher) return false;
        if (!(teacher.workDays || []).length) return true;
        return (teacher.workDays || []).includes(day);
      };

      const canTeacherWorkOnDay = (teacher, day) => {
        if (!teacher) return false;
        if (!isTeacherAllowedByWorkDays(teacher, day)) return false;
        // Niet-onderhandelbare dagen zijn altijd hard: andere dagen zijn onmogelijk voor auto-genereren.
        if ((teacher.fixedDays || []).length > 0 && !teacher.fixedDays.includes(day)) return false;
        return true;
      };

      const canTeacherBeUsedForClass = (teacher, cls) => {
        if (!teacher) return false;
        // Niet-onderhandelbare groep(en) zijn altijd hard: andere groepen zijn onmogelijk voor auto-genereren.
        if (getFixedClasses(teacher).length > 0 && !hasFixedClass(teacher, cls)) return false;
        return true;
      };

      const getTeacherDaysInClassResult = (cls, teacherId) =>
        DAYS.filter(d => ((result[cls]?.[d]?.teachers) || []).includes(teacherId));

      const getClassesForTeacherInResult = (teacherId) =>
        classes.filter(c => DAYS.some(d => ((result[c]?.[d]?.teachers) || []).includes(teacherId)));

      const getPairDaysInClassResult = (cls, teacherIdA, teacherIdB) =>
        DAYS.filter(d => {
          const ids = (result[cls]?.[d]?.teachers) || [];
          return ids.includes(teacherIdA) && ids.includes(teacherIdB);
        });

      const getTeacherAffinityScore = (teacher, cls, day, distinctIds = []) => {
        if (!teacher) return -99999;
        if (!canTeacherBeUsedForClass(teacher, cls)) return -99999;
        if (!canTeacherWorkOnDay(teacher, day)) return -99999;
        if (dailyBusy[teacher.id]?.has(day)) return -99999;

        let score = 0;
        const hasFixedClassForThisClass = hasFixedClass(teacher, cls);
        const prefersClass = (teacher.preferredClasses || []).includes(cls);
        const hasNoClassPreferences = !(teacher.preferredClasses || []).length;
        const alreadyInClass = distinctIds.includes(teacher.id);
        const wouldBeNewFace = !alreadyInClass;
        const daysAlreadyInClass = getTeacherDaysInClassResult(cls, teacher.id).length;
        const otherClassCount = getClassesForTeacherInResult(teacher.id).filter(c => c !== cls).length;
        const remaining = budgets[teacher.id] || 0;
        const usedUnits = getTeacherLoadFromResult(teacher.id);
        const desiredUnits = Math.round(Math.max(0, getDesiredFte(teacher)) * 10);
        const desiredRemaining = Math.max(0, desiredUnits - usedUnits);
        const desiredOver = Math.max(0, usedUnits - desiredUnits);

        // 1. Groep: vaste groep is bijna heilig, voorkeur is belangrijk maar niet verstikkend.
        if (hasFixedClassForThisClass) score += 1200;
        else if (prefersClass) score += 300;
        else if (hasNoClassPreferences) score += 60;
        else score -= 220;

        // 2. Rust per groep: voorkom derde/vierde gezichten en beloon continuïteit.
        if (alreadyInClass) score += 350;
        if (wouldBeNewFace && distinctIds.length === 1) score -= 250;
        if (wouldBeNewFace && distinctIds.length >= 2) score -= 900;
        if (daysAlreadyInClass >= 1) score += 180;
        if (daysAlreadyInClass >= 2) score += 120;

        // 3. Dagen: niet-onderhandelbaar is al hard geblokkeerd; gewone voorkeur is zachter dan groepsrust.
        if (isTeacherFixedForDay(teacher, day)) score += 350;
        else if (isTeacherPreferredForDay(teacher, day)) score += 100;
        else if ((teacher.preferredDays || []).length > 0) score += options.respectPreferredDays ? -40 : -20;
        else score += 20;

        if ((teacher.workDays || []).length > 0) {
          score += teacher.workDays.includes(day) ? 120 : -99999;
        }

        // 4. Voorkom versnippering van medewerkers over te veel groepen.
        if (wouldBeNewFace && otherClassCount >= 1) score -= otherClassCount * 120;
        if (wouldBeNewFace && otherClassCount >= 2) score -= 250;
        if (wouldBeNewFace && otherClassCount >= 3) score -= 600;

        // 5. Gewenste FTE telt mee naast contractruimte.
        score += desiredRemaining * 25;
        if (desiredOver > 0) score -= desiredOver * 120;
        score += remaining * 10;

        // 6. Eén vast gezicht blijft licht gunstiger als dat kan.
        if (options.preferSingleTeacher && remaining >= 2) score += 120;

        return score;
      };

      const getDistinctTeacherIdsForClassResult = cls => {
        const ids = new Set();
        DAYS.forEach(day => ((result[cls]?.[day]?.teachers) || []).forEach(id => ids.add(id)));
        return [...ids];
      };

      const countClassUnits = cls => DAYS.reduce((sum, day) => {
        const count = (result[cls]?.[day]?.teachers || []).length;
        return sum + (count > 0 ? 2 : 0);
      }, 0);

      const isTeacherCellLocked = (cls, day) => {
        if (options.clearExisting) return false;
        const existing = (assignments[cls] || {})[day] || {};
        return ((existing.teachers || []).length > 0);
      };

      const assignTeacherToDay = (cls, day, teacherIds) => {
        const cell = result[cls][day];
        if (!cell) return false;
        if ((cell.teachers || []).length > 0) return false;
        if (isTeacherCellLocked(cls, day)) return false;

        const currentDistinct = new Set(getDistinctTeacherIdsForClassResult(cls));
        const uniqueTeacherIds = [...new Set(teacherIds)].filter(Boolean);
        const prospectiveDistinct = new Set([...currentDistinct, ...uniqueTeacherIds]);

        if (!uniqueTeacherIds.length || uniqueTeacherIds.length > maxT) return false;
        if (prospectiveDistinct.size > maxT) return false;

        for (const id of uniqueTeacherIds) {
          const teacher = getTeacherById(id);
          if (!teacher) return false;
          const units = uniqueTeacherIds.length >= 2 ? 1 : 2;
          const desiredLimitUnits = Math.round(Math.max(0, Math.min(getDesiredFte(teacher), teacher.fte || 0)) * 10);
          const alreadyUsedUnits = getTeacherLoadFromResult(id);
          if (!canTeacherBeUsedForClass(teacher, cls)) return false;
          if (!canTeacherWorkOnDay(teacher, day)) return false;
          if ((budgets[id] || 0) < units) return false;
          // Gewenste FTE is een hard plafond wanneer deze zinvol is ingevuld.
          if (desiredLimitUnits > 0 && alreadyUsedUnits + units > desiredLimitUnits) return false;
          if (dailyBusy[id]?.has(day)) return false;
          if (!currentDistinct.has(id) && currentDistinct.size >= maxT) return false;
        }

        cell.teachers = [...uniqueTeacherIds];
        uniqueTeacherIds.forEach(id => {
          budgets[id] -= uniqueTeacherIds.length >= 2 ? 1 : 2;
          dailyBusy[id].add(day);
        });
        return true;
      };

      const getClassScarcity = (cls) => {
        const distinctIds = getDistinctTeacherIdsForClassResult(cls);
        const emptyDays = DAYS.filter(day => !isTeacherCellLocked(cls, day) && ((result[cls]?.[day]?.teachers || []).length === 0));
        const eligible = teachers.filter(t =>
          canTeacherBeUsedForClass(t, cls) &&
          emptyDays.some(day => canTeacherWorkOnDay(t, day) && !dailyBusy[t.id]?.has(day) && (budgets[t.id] || 0) > 0)
        );
        const totalUnits = eligible.reduce((sum, t) => sum + (budgets[t.id] || 0), 0);
        const fixedCount = eligible.filter(t => hasFixedClass(t, cls)).length;
        const prefCount = eligible.filter(t => (t.preferredClasses || []).includes(cls)).length;
        const existingCount = eligible.filter(t => distinctIds.includes(t.id)).length;
        const minDayChoices = emptyDays.length
          ? Math.min(...emptyDays.map(day => eligible.filter(t => canTeacherWorkOnDay(t, day) && !dailyBusy[t.id]?.has(day) && (budgets[t.id] || 0) > 0).length))
          : 99;

        return {
          cls,
          emptyDays: emptyDays.length,
          eligibleCount: eligible.length,
          totalUnits,
          fixedCount,
          prefCount,
          existingCount,
          scarcityScore:
            emptyDays.length * 250 +
            Math.max(0, 6 - eligible.length) * 160 +
            Math.max(0, 10 - totalUnits) * 70 +
            Math.max(0, 3 - minDayChoices) * 90 -
            fixedCount * 25 -
            prefCount * 15 -
            existingCount * 20
        };
      };

      const chooseBestTeacherPlacement = (cls, day) => {
        const cell = result[cls][day];
        if (!cell || (cell.teachers || []).length > 0 || isTeacherCellLocked(cls, day)) return null;

        const distinctIds = getDistinctTeacherIdsForClassResult(cls);

        const pool = teachers
          .filter(t => canTeacherBeUsedForClass(t, cls))
          .filter(t => canTeacherWorkOnDay(t, day))
          .filter(t => !dailyBusy[t.id]?.has(day))
          .filter(t => (budgets[t.id] || 0) > 0)
          .filter(t => distinctIds.includes(t.id) || distinctIds.length < maxT)
          .sort((a, b) => {
            const scoreA = getTeacherAffinityScore(a, cls, day, distinctIds);
            const scoreB = getTeacherAffinityScore(b, cls, day, distinctIds);
            return scoreB - scoreA;
          });

        if (!pool.length) return null;

        const singleCandidates = pool
          .filter(t => (budgets[t.id] || 0) >= 2)
          .map(t => {
            const daysAlreadyInClass = getTeacherDaysInClassResult(cls, t.id).length;
            return {
              type: "single",
              ids: [t.id],
              score:
                getTeacherAffinityScore(t, cls, day, distinctIds) +
                320 +
                (distinctIds.includes(t.id) ? 220 : 0) +
                (daysAlreadyInClass > 0 ? 160 : 0) +
                (options.preferSingleTeacher ? 180 : 60)
            };
          });

        const pairCandidates = [];
        if (maxT >= 2) {
          for (let i = 0; i < pool.length; i += 1) {
            for (let j = i + 1; j < pool.length; j += 1) {
              const a = pool[i];
              const b = pool[j];
              if ((budgets[a.id] || 0) < 1 || (budgets[b.id] || 0) < 1) continue;
              const wouldUse = new Set([...distinctIds, a.id, b.id]);
              if (wouldUse.size > maxT) continue;

              const scoreA = getTeacherAffinityScore(a, cls, day, distinctIds);
              const scoreB = getTeacherAffinityScore(b, cls, day, distinctIds);
              const continuityHits = Number(distinctIds.includes(a.id)) + Number(distinctIds.includes(b.id));
              const pairAlreadyUsedTogether = getPairDaysInClassResult(cls, a.id, b.id).length > 0;
              const futureFaces = new Set([...distinctIds, a.id, b.id]);
              let pairScore =
                ((scoreA + scoreB) / 2) +
                continuityHits * 220 +
                (pairAlreadyUsedTogether ? 260 : -60) -
                (options.preferSingleTeacher ? 150 : 45);

              if (futureFaces.size > 2) pairScore -= 1400;
              if (futureFaces.size > maxT) pairScore -= 99999;

              pairCandidates.push({ type: "pair", ids: [a.id, b.id], score: pairScore });
            }
          }
        }

        const ranked = [...singleCandidates, ...pairCandidates].sort((a, b) => b.score - a.score);
        return ranked[0] || null;
      };

      let improved = true;
      let guard = 0;

      while (improved && guard < 40) {
        improved = false;
        guard += 1;

        const classOrder = [...classes]
          .map(getClassScarcity)
          .filter(info => info.emptyDays > 0)
          .sort((a, b) => {
            if (b.scarcityScore !== a.scarcityScore) return b.scarcityScore - a.scarcityScore;
            if (a.eligibleCount !== b.eligibleCount) return a.eligibleCount - b.eligibleCount;
            return a.cls.localeCompare(b.cls, "nl");
          })
          .map(info => info.cls);

        classOrder.forEach(cls => {
          const emptyDays = DAYS
            .filter(day => !isTeacherCellLocked(cls, day) && ((result[cls]?.[day]?.teachers || []).length === 0))
            .sort((dayA, dayB) => {
              const scoreA = teachers.filter(t => canTeacherBeUsedForClass(t, cls) && canTeacherWorkOnDay(t, dayA) && !dailyBusy[t.id]?.has(dayA) && (budgets[t.id] || 0) > 0).length;
              const scoreB = teachers.filter(t => canTeacherBeUsedForClass(t, cls) && canTeacherWorkOnDay(t, dayB) && !dailyBusy[t.id]?.has(dayB) && (budgets[t.id] || 0) > 0).length;
              return scoreA - scoreB;
            });

          emptyDays.forEach(day => {
            const best = chooseBestTeacherPlacement(cls, day);
            if (!best) return;
            if (assignTeacherToDay(cls, day, best.ids)) improved = true;
          });
        });
      }

    } // end if mode teachers/both

    // Auto-assign support staff if mode is "support" or "both"
    // Leerkrachtenfase hierboven blijft ongemoeid. Deze fase vult alleen ondersteunings-FTE slimmer in.
    if (options.mode === "support" || options.mode === "both") {
      const assistants = staff
        .filter(s => s.function === "Onderwijsassistent" && s.autoEnabled !== false)
        .map(normalizeStaffMember);
      const teachersForSupport = staff
        .filter(s => s.function === "Leerkracht" && s.autoEnabled !== false)
        .map(normalizeStaffMember);
      // Overig personeel wordt bewust niet automatisch ingepland: dit zijn geen leerkrachten of onderwijsassistenten.
      const allSupportCandidates = [...assistants, ...teachersForSupport];

      const SUPPORT_EPS = 0.001;
      const slotFteValue = (slot) => ((slot?.am ? 0.1 : 0) + (slot?.pm ? 0.1 : 0));
      const normalizeSlot = (slot) => ({ am: !!slot?.am, pm: !!slot?.pm });

      const getCurrentLoadFromResultForStaff = (staffId) => {
        let total = 0;
        classes.forEach(cls => {
          DAYS.forEach(day => {
            const cell = result[cls]?.[day] || {};
            total += getTeacherLoadForCell(cell, staffId);
            total += getSupportLoadForCell(cell, staffId);
          });
        });
        return total;
      };

      const suppBudgets = {};
      allSupportCandidates.forEach(s => {
        const effective = Math.max(0, (s.fte || 0) - getStaffTaskFte(s) - getStaffLeaveFte(s) - getStaffSpecialFte(s));
        const used = getCurrentLoadFromResultForStaff(s.id);
        suppBudgets[s.id] = Math.max(0, Math.round((effective - used) * 10) / 10);
      });

      const isSuppPreferredForDay = (person, day) => {
        if (!(person.preferredDays || []).length) return true;
        return (person.preferredDays || []).includes(day);
      };

      const isSuppAllowedByWorkDays = (person, day) => {
        if (!(person.workDays || []).length) return true;
        return (person.workDays || []).includes(day);
      };

      const isSuppFixedForDay = (person, day) => {
        // Niet-onderhandelbare dagen zijn ook voor ondersteuning hard.
        if (!(person.fixedDays || []).length) return true;
        return (person.fixedDays || []).includes(day);
      };

      const isSuppAllowedByClass = (person, cls) => {
        const fixedClasses = getFixedClasses(person);
        if (!fixedClasses.length) return true;
        return fixedClasses.includes(cls);
      };

      const getSupportDaysInClassResult = (cls, staffId) =>
        DAYS.filter(d => {
          const cell = result[cls]?.[d] || {};
          return (cell.assistants || []).includes(staffId) || (cell.supporters || []).includes(staffId);
        });

      const getSupportClassesForStaffInResult = (staffId) =>
        classes.filter(c => DAYS.some(d => {
          const cell = result[c]?.[d] || {};
          return (cell.assistants || []).includes(staffId) || (cell.supporters || []).includes(staffId);
        }));

      const getCurrentSupportFteForClass = (cls) => {
        let total = 0;
        DAYS.forEach(day => {
          const cell = (result[cls] || {})[day] || {};
          [...(cell.assistants || []), ...(cell.supporters || [])].forEach(id => {
            total += getSupportLoadForCell(cell, id);
          });
        });
        return Math.round(total * 10) / 10;
      };

      const suppDayBusy = {};
      allSupportCandidates.forEach(s => {
        suppDayBusy[s.id] = {};
        DAYS.forEach(day => { suppDayBusy[s.id][day] = { am:false, pm:false }; });
      });

      const markSupportBusy = (staffId, day, slot = { am:true, pm:true }) => {
        if (!suppDayBusy[staffId]) return;
        suppDayBusy[staffId][day] = suppDayBusy[staffId][day] || { am:false, pm:false };
        if (slot.am) suppDayBusy[staffId][day].am = true;
        if (slot.pm) suppDayBusy[staffId][day].pm = true;
      };

      const hasFreeSupportSlot = (staffId, day, needed = 0.1) => {
        const busy = suppDayBusy[staffId]?.[day] || { am:false, pm:false };
        if (needed >= 0.2 - SUPPORT_EPS) return !busy.am && !busy.pm;
        return !busy.am || !busy.pm;
      };

      const chooseSupportSlot = (staffId, day, remainingDeficit, remainingBudget, preferHalfDay = false) => {
        const busy = suppDayBusy[staffId]?.[day] || { am:false, pm:false };
        const budget = Number(remainingBudget) || 0;
        const deficit = Number(remainingDeficit) || 0;

        // Bij een tekort van 0,10 of een budgetrestje van 0,10 vullen we gericht een halve dag.
        if (preferHalfDay || deficit <= 0.1 + SUPPORT_EPS || budget < 0.2 - SUPPORT_EPS) {
          if (!busy.am && budget >= 0.1 - SUPPORT_EPS) return { am:true, pm:false, fte:0.1 };
          if (!busy.pm && budget >= 0.1 - SUPPORT_EPS) return { am:false, pm:true, fte:0.1 };
          return null;
        }

        // Anders liever een hele dag, omdat dat rustiger is en de FTE sneller dekt.
        if (!busy.am && !busy.pm && deficit >= 0.2 - SUPPORT_EPS && budget >= 0.2 - SUPPORT_EPS) {
          return { am:true, pm:true, fte:0.2 };
        }
        if (!busy.am && budget >= 0.1 - SUPPORT_EPS) return { am:true, pm:false, fte:0.1 };
        if (!busy.pm && budget >= 0.1 - SUPPORT_EPS) return { am:false, pm:true, fte:0.1 };
        return null;
      };

      classes.forEach(cls => DAYS.forEach(day => {
        const cell = result[cls]?.[day] || {};
        // Een leerkracht die voor de klas staat is die dag niet óók beschikbaar als ondersteuning.
        (cell.teachers || []).forEach(id => markSupportBusy(id, day, { am:true, pm:true }));
        [...(cell.assistants || []), ...(cell.supporters || [])].forEach(id => {
          markSupportBusy(id, day, getSupportSlot(cell, id));
        });
      }));

      const isSupportCellLocked = (cls, day) => {
        if (options.clearExisting) return false;
        const existing = (assignments[cls] || {})[day] || {};
        return ((existing.assistants || []).length + (existing.supporters || []).length) > 0;
      };

      const supportCandidateScore = (s, cls, day, targetType, slot, remainingDeficit) => {
        if (!s || !slot) return -99999;
        if (!isSuppFixedForDay(s, day)) return -99999;
        if (!isSuppAllowedByClass(s, cls)) return -99999;
        if (!isSuppAllowedByWorkDays(s, day)) return -99999;
        if ((suppBudgets[s.id] || 0) < slot.fte - SUPPORT_EPS) return -99999;

        const cell = result[cls]?.[day] || {};
        const alreadyInCell = [...(cell.assistants || []), ...(cell.supporters || [])].includes(s.id);
        const daysInClass = getSupportDaysInClassResult(cls, s.id).length;
        const otherClassCount = getSupportClassesForStaffInResult(s.id).filter(c => c !== cls).length;
        const dayPreference = isSuppPreferredForDay(s, day) ? 90 : ((s.preferredDays || []).length ? -35 : 15);
        const classPreference = (s.preferredClasses || []).includes(cls) ? 140 : (!(s.preferredClasses || []).length ? 30 : -60);
        const continuity = daysInClass > 0 ? 220 : 0;
        const sameCellBonus = alreadyInCell ? 160 : 0;
        const calmClass = otherClassCount === 0 ? 40 : -(otherClassCount * 110);
        const budgetFit = Math.min(suppBudgets[s.id] || 0, remainingDeficit) * 35;
        const assistantBonus = targetType === "assistants" ? 80 : 0;
        const fullDayBonus = slot.fte >= 0.2 - SUPPORT_EPS && remainingDeficit >= 0.2 - SUPPORT_EPS ? 70 : 0;
        const halfDayFitBonus = slot.fte < 0.2 && remainingDeficit <= 0.1 + SUPPORT_EPS ? 120 : 0;

        return dayPreference + classPreference + continuity + sameCellBonus + calmClass + budgetFit + assistantBonus + fullDayBonus + halfDayFitBonus;
      };

      const addOrUpdateSupportInCell = (cls, day, staffId, targetType, slot) => {
        if (!result[cls]) result[cls] = {};
        if (!result[cls][day]) result[cls][day] = { teachers: [], assistants: [], supporters: [], supportSlots: {} };
        const cell = result[cls][day];
        cell.assistants = cell.assistants || [];
        cell.supporters = cell.supporters || [];
        cell.supportSlots = cell.supportSlots || {};
        const otherType = targetType === "assistants" ? "supporters" : "assistants";
        cell[otherType] = (cell[otherType] || []).filter(id => id !== staffId);
        if (!cell[targetType].includes(staffId)) cell[targetType].push(staffId);
        const existing = normalizeSlot(cell.supportSlots[staffId] || { am:false, pm:false });
        cell.supportSlots[staffId] = { am: existing.am || !!slot.am, pm: existing.pm || !!slot.pm };
      };

      const findBestSupportPlacement = (poolList, targetType, cls, remainingDeficit, preferHalfDay = false) => {
        const optionsForClass = [];
        DAYS.forEach(day => {
          if (isSupportCellLocked(cls, day)) return;
          const cell = result[cls]?.[day] || { assistants: [], supporters: [], supportSlots: {} };
          const supportCount = ((cell.assistants || []).length + (cell.supporters || []).length);

          poolList.forEach(s => {
            if (!isSuppFixedForDay(s, day) || !isSuppAllowedByClass(s, cls) || !isSuppAllowedByWorkDays(s, day)) return;
            if (!hasFreeSupportSlot(s.id, day, 0.1)) return;

            // Voorkom drukke ondersteuningscellen: bestaand halfdag-slot aanvullen mag, anders max 1 ondersteuner per dagdeel/cel.
            const alreadyInCell = [...(cell.assistants || []), ...(cell.supporters || [])].includes(s.id);
            if (!alreadyInCell && supportCount >= 2) return;

            const slot = chooseSupportSlot(s.id, day, remainingDeficit, suppBudgets[s.id] || 0, preferHalfDay);
            if (!slot) return;
            const score = supportCandidateScore(s, cls, day, targetType, slot, remainingDeficit);
            optionsForClass.push({ staff:s, day, slot, score });
          });
        });
        return optionsForClass.sort((a, b) => b.score - a.score)[0] || null;
      };

      const fillSupportForPool = (poolList, targetType) => {
        let improved = true;
        let guard = 0;
        while (improved && guard < 60) {
          improved = false;
          guard += 1;

          const classOrder = [...classes]
            .map(cls => {
              const req = Number(supportReq[cls] || 0);
              if (req <= 0) return null;
              const current = getCurrentSupportFteForClass(cls);
              const deficit = Math.max(0, Math.round((req - current) * 10) / 10);
              if (deficit <= SUPPORT_EPS) return null;
              const candidateCount = poolList.filter(s =>
                DAYS.some(day => !isSupportCellLocked(cls, day) && isSuppFixedForDay(s, day) && isSuppAllowedByClass(s, cls) && isSuppAllowedByWorkDays(s, day) && hasFreeSupportSlot(s.id, day, 0.1) && (suppBudgets[s.id] || 0) >= 0.1 - SUPPORT_EPS)
              ).length;
              return { cls, req, current, deficit, candidateCount };
            })
            .filter(Boolean)
            .sort((a, b) => {
              if (b.deficit !== a.deficit) return b.deficit - a.deficit;
              if (a.candidateCount !== b.candidateCount) return a.candidateCount - b.candidateCount;
              return a.cls.localeCompare(b.cls, "nl");
            });

          for (const item of classOrder) {
            const preferHalfDay = item.deficit <= 0.1 + SUPPORT_EPS;
            const best = findBestSupportPlacement(poolList, targetType, item.cls, item.deficit, preferHalfDay);
            if (!best) continue;
            addOrUpdateSupportInCell(item.cls, best.day, best.staff.id, targetType, best.slot);
            suppBudgets[best.staff.id] = Math.max(0, Math.round((suppBudgets[best.staff.id] - best.slot.fte) * 10) / 10);
            markSupportBusy(best.staff.id, best.day, best.slot);
            improved = true;
          }
        }
      };

      // Eerst onderwijsassistenten benutten voor ondersteunings-FTE, daarna pas leerkrachten als extra ondersteuning.
      fillSupportForPool(assistants, "assistants");
      fillSupportForPool(teachersForSupport, "supporters");
    }
    setAssignments(result);

    const summary = classes.map(cls => {
      const clsA = result[cls] || {};
      const teacherIds = [...new Set(DAYS.flatMap(day => (clsA[day]?.teachers || [])))];
      const teacherDays = {};
      teacherIds.forEach(id => {
        const t = staff.find(s => s.id === id);
        if (!t) return;
        teacherDays[t.name] = DAYS.filter(day => (clsA[day]?.teachers || []).includes(id)).map(d => {
          const count = (clsA[d]?.teachers || []).length;
          const short = DAY_SHORT[DAYS.indexOf(d)];
          return count >= 2 ? `${short}½` : short;
        });
      });
      const teacherFte = DAYS.reduce((acc, day) => acc + (((clsA[day]?.teachers || []).length > 0) ? 0.2 : 0), 0);
      return { cls, teacherDays, teacherFte };
    });

    setAutoResult(summary);
    notif(`Formatie gegenereerd met optimale score (${options.mode === "teachers" ? "alleen leerkrachten" : options.mode === "support" ? "alleen ondersteuning" : "leerkrachten + ondersteuning"}, max ${options.maxTeachersPerClass} lk/klas).`);
  };

  function getClassSupportFteFromResult(result, cls) {
    let days=0;
    const clsA=result[cls]||{};
    DAYS.forEach(day => {

  const quickAddStaffMembers = () => {
    // Split on newlines and semicolons only (NOT commas — those can be decimal separators)
    const lines = quickStaffInput
      .split(/[\n;]+/)
      .map(l => l.trim())
      .filter(Boolean);

    if (!lines.length) {
      notif("Voer eerst één of meer namen in.", "error");
      return;
    }

    // Parse each line: "Naam 0,6" or "Naam 0.6" or just "Naam"
    // Also support "Naam, 0,6" or "Naam - 0.8" etc.
    const parsed = lines.map(line => {
      // Try to match a number (with , or . as decimal) at the end of the line
      const match = line.match(/^(.+?)[\s,\-–]+(\d+[.,]\d+)\s*$/);
      if (match) {
        const name = match[1].replace(/[\s,\-–]+$/, '').trim();
        const fte = parseFloat(match[2].replace(',', '.'));
        if (name && !isNaN(fte) && fte > 0 && fte <= 1) {
          return { name, fte };
        }
      }
      // Also try just a plain number at the end like "Kars 1"
      const matchInt = line.match(/^(.+?)\s+(\d)\s*$/);
      if (matchInt) {
        const name = matchInt[1].trim();
        const fte = parseInt(matchInt[2], 10);
        if (name && fte === 1) {
          return { name, fte: 1.0 };
        }
      }
      // No FTE found — use default 1.0
      return { name: line.trim(), fte: 1.0 };
    });

    const uniqueParsed = [];
    const seenNames = new Set();
    parsed.forEach(p => {
      const key = p.name.toLowerCase();
      if (!seenNames.has(key)) {
        seenNames.add(key);
        uniqueParsed.push(p);
      }
    });

    const existingNames = new Set(staff.map(member => member.name.trim().toLowerCase()));
    const additions = uniqueParsed
      .filter(p => !existingNames.has(p.name.toLowerCase()))

        fixedDays: [],
        autoEnabled: true,
        hasTasks: false,
        tasks: [],
        notes: "",
        expertGroups: [],
        customFunction: "",
        workDays: []
      }));

      notif("Deze medewerkers staan al in de lijst.", "error");
      return;

    setQuickStaffInput("");
    notif(`${additions.length} medewerker(s) toegevoegd: ${additions.map(a => `${a.name} (${a.fte} FTE)`).join(", ")}`);

  const usedClasses = classes.filter(cls =>

  );
  const totalContractFte = staff.reduce((sum, s) => sum + (Number(s.fte) || 0), 0);
  const totalDesiredFte = staff.reduce((sum, s) => sum + getDesiredFte(s), 0);
  const totalDesiredDeltaFte = staff.reduce((sum, s) => sum + getDesiredDelta(s), 0);
  const totalWantMoreFte = staff.reduce((sum, s) => sum + Math.max(0, getDesiredDelta(s)), 0);
  const totalWantLessFte = staff.reduce((sum, s) => sum + Math.max(0, -getDesiredDelta(s)), 0);
  const totalTaskFte = staff.reduce((sum, s) => sum + (s.function !== "Overig" ? getStaffTaskFte(s) : 0), 0);
  const totalLeaveFte = staff.reduce((sum, s) => sum + getStaffLeaveFte(s), 0);
  const totalSpecialFte = staff.reduce((sum, s) => sum + (s.function !== "Overig" ? getStaffSpecialFte(s) : 0), 0);
  const totalOtherStaffFte = staff.filter(s => s.function === "Overig").reduce((sum, s) => sum + (Number(s.fte) || 0), 0);
  const totalTeacherContractFte = staff.filter(s => s.function === "Leerkracht").reduce((sum, s) => sum + (Number(s.fte) || 0), 0);
  const totalAssistantContractFte = staff.filter(s => s.function === "Onderwijsassistent").reduce((sum, s) => sum + (Number(s.fte) || 0), 0);
  const totalTeacherUsedFte = staff.filter(s => s.function === "Leerkracht").reduce((sum, s) => sum + getFteUsed(s.id), 0);
  const totalAssistantUsedFte = staff.filter(s => s.function === "Onderwijsassistent").reduce((sum, s) => sum + getFteUsed(s.id), 0);
  const totalTeacherEffectiveFte = staff.filter(s => s.function === "Leerkracht").reduce((sum, s) => sum + getEffectiveFte(s.id), 0);
  const totalAssistantEffectiveFte = staff.filter(s => s.function === "Onderwijsassistent").reduce((sum, s) => sum + getEffectiveFte(s.id), 0);
  const totalEffectiveFte = staff.filter(s => s.function !== "Overig").reduce((sum, s) => sum + Math.max(0, (Number(s.fte) || 0) - getStaffTaskFte(s) - getStaffLeaveFte(s) - getStaffSpecialFte(s)), 0);
  const totalUsedFte = staff.filter(s => s.function !== "Overig").reduce((sum, s) => sum + getFteUsed(s.id), 0);
  const hasManualAvailableFte = String(manualAvailableFte).trim() !== "" && Number.isFinite(Number(String(manualAvailableFte).replace(",", ".")));
  const totalAvailableForPlanner = hasManualAvailableFte ? Math.max(0, Number(String(manualAvailableFte).replace(",", "."))) : totalContractFte;
  const totalRemainingFte = Math.max(0, totalAvailableForPlanner - totalUsedFte);
  const totalOverplannedFte = Math.max(0, totalUsedFte - totalAvailableForPlanner);
  const totalUtilizedFte = totalUsedFte + totalOtherStaffFte + totalTaskFte + totalSpecialFte + totalLeaveFte;
  const totalPlannerUtilizationPct = totalAvailableForPlanner > 0 ? (totalUsedFte / totalAvailableForPlanner) * 100 : 0;
  const totalExplainedAgainstContract = totalUtilizedFte;
  const totalDifferenceAgainstContract = totalContractFte - totalExplainedAgainstContract;
  const controlRows = [...staff]
    .map(s => {

      const leave = getStaffLeaveFte(s);
      const special = s.function === "Overig" ? 0 : getStaffSpecialFte(s);

                            <span style={{ fontSize:20 }}>{s.function==="Leerkracht"?"👩‍🏫":s.function==="Onderwijsassistent"?"🤝":"📌"}</span>
