                  const hasSupport = classes.some(cls => {
                    const clsA=assignments[cls]||{};
                    return DAYS.some(day=>[...(clsA[day]?.supporters||[]),...(clsA[day]?.assistants||[])].includes(s.id));
                  });
                  return (
                    <div key={s.id} style={{ background: remain>0.001?"#FFFBEB":"#F0FDF4", borderRadius:12, padding:"12px 16px", border:`1px solid ${remain>0.001?"#FDE68A":"#BBF7D0"}` }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                        <div onClick={()=>editStaffById(s.id)} style={{ fontWeight:700, fontSize:14, color:"#1E293B", cursor:"pointer", textDecoration:"underline", textDecorationStyle:"dotted", textUnderlineOffset:2 }}>{s.name}</div>
                        <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                          {taskFte > 0 && <span style={{ fontSize:11, background:"#EDE9FE", color:"#6D28D9", borderRadius:20, padding:"2px 8px", fontWeight:700 }}>📝 {taskFte.toFixed(2)}</span>}
                          {leaveFte > 0 && <span style={{ fontSize:11, background:"#FEF3C7", color:"#92400E", borderRadius:20, padding:"2px 8px", fontWeight:700 }}>🏖️ {leaveFte.toFixed(2)}</span>}
                          {hasSupport && <span style={{ fontSize:11, background:"#F3E8FF", color:"#7C3AED", borderRadius:20, padding:"2px 8px", fontWeight:700 }}>🧩</span>}
                          {remain<0.001 && <span style={{ fontSize:11, background:"#DCFCE7", color:"#166534", borderRadius:20, padding:"2px 8px", fontWeight:700 }}>✓</span>}
                        </div>
                      </div>
                      <div style={{ display:"flex", gap:6, fontSize:11, color:"#64748B", marginBottom:6, flexWrap:"wrap" }}>
                        <span>Contract: <b>{parseFloat(s.fte.toFixed(4))}</b></span>
                        <span>·</span>
                        <span>Gewenst: <b>{formatFte(getDesiredFte(s))}</b></span>
                        <span>·</span>
                        <span>Klas: <b>{used.toFixed(2)}</b> / {effective.toFixed(2)}</span>
                        {remain>0.001 && <><span>·</span><span style={{ color:"#D97706", fontWeight:700 }}>Over: {remain.toFixed(2)}</span></>}
                        {Math.abs(getDesiredGap(s)) > 0.001 && <><span>·</span><span style={{ color:getDesiredGap(s) > 0 ? "#166534" : "#B45309", fontWeight:700 }}>{getDesiredGap(s) > 0 ? `Nog open: +${formatFte(getDesiredGap(s))}` : `Boven wens: ${formatFte(Math.abs(getDesiredGap(s)))}`}</span></>}
                      </div>
                      <div style={{ display:"flex", borderRadius:4, height:6, background:"#E2E8F0", overflow:"hidden" }}>
                        <div style={{ width:`${Math.min(100,used/s.fte*100)}%`, height:"100%", background:pct>=100?"#22C55E":"#F59E0B", transition:"width 0.5s" }}/>
                        {taskFte > 0 && <div style={{ width:`${Math.min(100-Math.min(100,used/s.fte*100),taskFte/s.fte*100)}%`, height:"100%", background:"#7C3AED", transition:"width 0.5s" }}/>}
                        {leaveFte > 0 && <div style={{ width:`${Math.min(100-Math.min(100,(used+taskFte)/s.fte*100),leaveFte/s.fte*100)}%`, height:"100%", background:"#F59E0B", transition:"width 0.5s" }}/>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ── MODAL: Medewerker ── */}
      {showStaffModal && editingStaff && (
        <Modal onClose={()=>{setShowStaffModal(false); setStaffModalFocus("");}}>
          <h3 style={{ fontSize:20, fontWeight:800, color:"#1E3A5F", marginBottom:22 }}>
            {staff.find(s=>s.id===editingStaff.id)?"✏️ Medewerker bewerken":"➕ Medewerker toevoegen"}
          </h3>
          <div style={{ display:"flex", flexDirection:"column", gap:18 }}>
            <div>
              <label style={labelStyle}>Naam</label>
              <input value={editingStaff.name} onChange={e=>setEditingStaff({...editingStaff,name:e.target.value})} style={inputStyle} placeholder="Volledige naam"/>
            </div>
            <div>
              <label style={labelStyle}>Functie</label>
              <div style={{ display:"flex", gap:8 }}>
                {FUNCTIONS.map(fn=>(
                  <button key={fn} onClick={()=>setEditingStaff({...editingStaff,function:fn})} style={{ flex:1, padding:"10px", borderRadius:8, fontFamily:"Outfit", fontSize:14, fontWeight:600, cursor:"pointer", border:`2px solid ${editingStaff.function===fn?"#2563EB":"#E2E8F0"}`, background:editingStaff.function===fn?"#EFF6FF":"white", color:editingStaff.function===fn?"#2563EB":"#64748B" }}>
                    {fn==="Leerkracht"?"👩‍🏫 ":fn==="Onderwijsassistent"?"🤝 ":"📌 "}{fn}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <label style={labelStyle}>FTE (contractomvang)</label>
              <input {...textNumberInputProps} value={editingStaff.fte}
                onChange={e=>{ const v=parseFteValue(e.target.value, 0, 1); if(v!==null) setEditingStaff({...editingStaff,fte:v}); }}
                style={inputStyle} placeholder="bijv. 0,00 of 0,6314"/>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginTop:8 }}>
                {[0.4,0.5,0.6,0.7,0.8,0.9,1.0].map(f=>(
                  <button key={f} onClick={()=>setEditingStaff({...editingStaff,fte:f})} style={{ padding:"5px 11px", borderRadius:7, fontFamily:"Outfit", fontSize:12, fontWeight:600, cursor:"pointer", border:`1.5px solid ${Math.abs(editingStaff.fte-f)<0.001?"#2563EB":"#E2E8F0"}`, background:Math.abs(editingStaff.fte-f)<0.001?"#EFF6FF":"#F8FAFC", color:Math.abs(editingStaff.fte-f)<0.001?"#2563EB":"#64748B" }}>{f}</button>
                ))}
              </div>
            </div>

            <div id="staff-section-desiredFte">
              <label style={labelStyle}>Gewenste FTE</label>
              <input {...textNumberInputProps} value={editingStaff.desiredFte ?? editingStaff.fte}
                onChange={e=>{ const v=parseFteValue(e.target.value, 0, 1); if(v!==null) setEditingStaff({...editingStaff,desiredFte:v}); }}
                style={inputStyle} placeholder="bijv. 0,00 of 0,60"/>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginTop:8 }}>
                {[0.4,0.5,0.6,0.7,0.8,0.9,1.0].map(f=>(
                  <button key={f} onClick={()=>setEditingStaff({...editingStaff,desiredFte:f})} style={{ padding:"5px 11px", borderRadius:7, fontFamily:"Outfit", fontSize:12, fontWeight:600, cursor:"pointer", border:`1.5px solid ${Math.abs((editingStaff.desiredFte ?? editingStaff.fte)-f)<0.001?"#0F766E":"#E2E8F0"}`, background:Math.abs((editingStaff.desiredFte ?? editingStaff.fte)-f)<0.001?"#ECFDF5":"#F8FAFC", color:Math.abs((editingStaff.desiredFte ?? editingStaff.fte)-f)<0.001?"#0F766E":"#64748B" }}>{f}</button>
                ))}
              </div>
              <div style={{ marginTop:8, fontSize:12, color:getDesiredDelta(editingStaff) > 0.001 ? "#166534" : getDesiredDelta(editingStaff) < -0.001 ? "#B45309" : "#64748B", fontWeight:700 }}>
                {getDesiredDelta(editingStaff) > 0.001 ? `Deze medewerker wil ${formatFte(getDesiredDelta(editingStaff))} FTE meer werken.` : getDesiredDelta(editingStaff) < -0.001 ? `Deze medewerker wil ${formatFte(Math.abs(getDesiredDelta(editingStaff)))} FTE minder werken.` : "Deze medewerker wil dezelfde FTE blijven werken."}
              </div>
            </div>

            {/* FTE verdeling - voor niet-Overig */}
            {editingStaff.function !== "Overig" && (
              <div style={{ background:"#F8FAFC", borderRadius:14, padding:"16px 18px", border:"1px solid #E2E8F0" }}>
                <label style={{ ...labelStyle, marginBottom:12 }}>FTE-verdeling</label>
                <div style={{ fontSize:12, color:"#475569", marginBottom:12 }}>Contract: <strong>{formatFte(editingStaff.fte || 0)}</strong> · Gewenst: <strong>{formatFte(getDesiredFte(editingStaff))}</strong> · <span style={{ color:getDesiredDelta(editingStaff) > 0.001 ? "#166534" : getDesiredDelta(editingStaff) < -0.001 ? "#B45309" : "#64748B", fontWeight:700 }}>{getDesiredDirectionLabel(editingStaff)}</span></div>
                {(() => {
                  const editTaskFte = getStaffTaskFte(editingStaff);
                  const editLeaveFte = getStaffLeaveFte(editingStaff);
                  const editClassFte = Math.max(0, (editingStaff.fte || 0) - editTaskFte - editLeaveFte);
                  const total = editingStaff.fte || 1;
                  const classroomPct = Math.max(0, editClassFte / total * 100);
                  const taskPct = Math.min(100 - classroomPct, editTaskFte / total * 100);
                  const leavePct = Math.min(100 - classroomPct - taskPct, editLeaveFte / total * 100);
                  return (
                    <>
                      <div style={{ display:"flex", gap:12, alignItems:"flex-start", flexWrap:"wrap" }}>
                        <div style={{ flex:1, minWidth:100 }}>
                          <div style={{ fontSize:11, fontWeight:700, color:"#2563EB", marginBottom:4 }}>👩‍🏫 Klas</div>
                          <div style={{ fontSize:24, fontWeight:800, color:"#1E3A5F" }}>{editClassFte.toFixed(2)}</div>
                        </div>
                        <div style={{ flex:1, minWidth:100 }}>
                          <div style={{ fontSize:11, fontWeight:700, color:"#7C3AED", marginBottom:4 }}>📝 Taken</div>
                          <div style={{ fontSize:24, fontWeight:800, color:"#7C3AED" }}>{editTaskFte.toFixed(2)}</div>
                        </div>
                        <div style={{ flex:1, minWidth:100 }}>
                          <div style={{ fontSize:11, fontWeight:700, color:"#D97706", marginBottom:4 }}>🏖️ Verlof</div>
                          <div style={{ fontSize:24, fontWeight:800, color:"#D97706" }}>{editLeaveFte.toFixed(2)}</div>
                        </div>
                      </div>
                      <div style={{ marginTop:10 }}>
                        <div style={{ display:"flex", borderRadius:6, overflow:"hidden", height:10 }}>
                          <div style={{ width:`${classroomPct}%`, background:"#2563EB", transition:"width 0.3s" }}/>
                          <div style={{ width:`${taskPct}%`, background:"#7C3AED", transition:"width 0.3s" }}/>
                          <div style={{ width:`${leavePct}%`, background:"#F59E0B", transition:"width 0.3s" }}/>
                        </div>
                        <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, marginTop:3, color:"#64748B" }}>
                          <span style={{ color:"#2563EB", fontWeight:600 }}>Klas: {editClassFte.toFixed(2)}</span>
                          {editTaskFte > 0 && <span style={{ color:"#7C3AED", fontWeight:600 }}>Taken: {editTaskFte.toFixed(2)}</span>}
                          {editLeaveFte > 0 && <span style={{ color:"#D97706", fontWeight:600 }}>Verlof: {editLeaveFte.toFixed(2)}</span>}
                          <span>Totaal: {(editingStaff.fte||0).toFixed(2)}</span>
                        </div>
                      </div>
                      {(editTaskFte + editLeaveFte) > (editingStaff.fte || 0) + 0.001 && (
                        <div style={{ marginTop:8, fontSize:12, color:"#DC2626", fontWeight:700 }}>⚠️ Taken + Verlof ({(editTaskFte+editLeaveFte).toFixed(2)}) overschrijdt contract ({(editingStaff.fte||0).toFixed(2)})</div>
                      )}
                    </>
                  );
                })()}
                <div style={{ fontSize:12, color:"#64748B", marginTop:8 }}>
                  De inzetbare FTE wordt berekend op basis van het contract minus taken en verlof.
                </div>
              </div>
            )}

            {editingStaff.function === "Overig" ? (
              <>
                <div>
                  <label style={labelStyle}>Functieomschrijving</label>
                  <input value={editingStaff.customFunction || ""} onChange={e=>setEditingStaff({...editingStaff,customFunction:e.target.value})} style={inputStyle} placeholder="bijv. IB-er, Conciërge, Directeur..."/>
                  <div style={{ fontSize:12, color:"#64748B", marginTop:6 }}>
                    Omschrijf de specifieke functie van deze medewerker. Overige medewerkers worden niet meegenomen in de formatieplanning.
                  </div>
                </div>
                <div>
                  <label style={labelStyle}>Werkdagen</label>
                  <div style={{ display:"flex", gap:7 }}>
                    {DAYS.map((day,i)=>(
                      <button key={day} onClick={()=>{ const d=(editingStaff.workDays || []).includes(day)?(editingStaff.workDays||[]).filter(x=>x!==day):[...(editingStaff.workDays||[]),day]; setEditingStaff({...editingStaff,workDays:d}); }} style={{ flex:1, padding:"9px 5px", borderRadius:8, fontFamily:"Outfit", fontSize:12, fontWeight:700, cursor:"pointer", border:`2px solid ${(editingStaff.workDays || []).includes(day)?"#2563EB":"#E2E8F0"}`, background:(editingStaff.workDays || []).includes(day)?"#2563EB":"white", color:(editingStaff.workDays || []).includes(day)?"white":"#64748B" }}>{DAY_SHORT[i]}</button>
                    ))}
                  </div>
                </div>
                {renderTaskAndLeaveEditor()}
              </>
            ) : (
              <>
                <div>
                  <label style={labelStyle}>Auto-genereren</label>
                  <button
                    onClick={()=>setEditingStaff({...editingStaff, autoEnabled: editingStaff.autoEnabled===false})}
                    style={{
                      width:"100%",
                      display:"flex",
                      alignItems:"center",
                      justifyContent:"space-between",
                      gap:12,
                      padding:"12px 14px",
                      borderRadius:12,
                      border:`1.5px solid ${editingStaff.autoEnabled===false?"#FBCFE8":"#BBF7D0"}`,
                      background:editingStaff.autoEnabled===false?"#FFF1F2":"#F0FDF4",
                      cursor:"pointer",
                      fontFamily:"Outfit"
                    }}
                  >
                    <div style={{ textAlign:"left" }}>
                      <div style={{ fontSize:14, fontWeight:800, color:editingStaff.autoEnabled===false?"#BE123C":"#166534" }}>
                        {editingStaff.autoEnabled===false ? "Niet meenemen in auto-genereren" : "Wel meenemen in auto-genereren"}
                      </div>
                      <div style={{ fontSize:12, color:"#64748B", marginTop:2 }}>
                        Handige knop om een docent tijdelijk uit de automatische planning te halen.
                      </div>
                    </div>
                    <div style={{
                      minWidth:92,
                      textAlign:"center",
                      padding:"8px 10px",
                      borderRadius:999,
                      background:editingStaff.autoEnabled===false?"#E11D48":"#16A34A",
                      color:"white",
                      fontSize:12,
                      fontWeight:800
                    }}>
                      {editingStaff.autoEnabled===false ? "Auto uit" : "Auto aan"}
                    </div>
                  </button>
                </div>
                <div>
                  <label style={labelStyle}>Voorkeursdagen</label>
                  <div style={{ display:"flex", gap:7 }}>
                    {DAYS.map((day,i)=>(
                      <button key={day} onClick={()=>{ const d=(editingStaff.preferredDays || []).includes(day)?editingStaff.preferredDays.filter(x=>x!==day):[...editingStaff.preferredDays,day]; setEditingStaff({...editingStaff,preferredDays:d}); }} style={{ flex:1, padding:"9px 5px", borderRadius:8, fontFamily:"Outfit", fontSize:12, fontWeight:700, cursor:"pointer", border:`2px solid ${(editingStaff.preferredDays || []).includes(day)?"#2563EB":"#E2E8F0"}`, background:(editingStaff.preferredDays || []).includes(day)?"#2563EB":"white", color:(editingStaff.preferredDays || []).includes(day)?"white":"#64748B" }}>{DAY_SHORT[i]}</button>
                    ))}
                  </div>
                </div>
                <div>
                  <label style={labelStyle}>Voorkeur groepen</label>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
                    {classes.map(cls=>{ const on=(editingStaff.preferredClasses || []).includes(cls); const col=classColor(cls); return (
                      <button key={cls} onClick={()=>{ const current = editingStaff.preferredClasses || []; const c=on?current.filter(x=>x!==cls):[...current,cls]; setEditingStaff({...editingStaff,preferredClasses:c}); }} style={{ padding:"6px 12px", borderRadius:20, fontFamily:"Outfit", fontSize:12, fontWeight:600, cursor:"pointer", border:`2px solid ${on?col:"#E2E8F0"}`, background:on?col+"22":"white", color:on?col:"#64748B" }}>{cls}</button>
                    );})}
                  </div>
                </div>
                <div>
                  <label style={labelStyle}>Niet-onderhandelbare groepen</label>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
                    {classes.map(cls=>{ const on=getFixedClasses(editingStaff).includes(cls); const col=classColor(cls); return (
                      <button key={cls} type="button" onClick={()=>{ const current=getFixedClasses(editingStaff); const next=on?current.filter(x=>x!==cls):[...current,cls]; setEditingStaff({...editingStaff,fixedClasses:next,fixedClass:next[0]||""}); }} style={{ padding:"6px 12px", borderRadius:20, fontFamily:"Outfit", fontSize:12, fontWeight:700, cursor:"pointer", border:`2px solid ${on?col:"#E2E8F0"}`, background:on?col+"22":"white", color:on?col:"#64748B" }}>{cls}</button>
                    );})}
                  </div>
                  <div style={{ fontSize:12, color:"#64748B", marginTop:6 }}>
                    Selecteer hier één of meerdere groepen. Zo kun je bijvoorbeeld bovenbouw vastzetten en voorkomen dat iemand bij de kleuters wordt ingepland.
                  </div>
                </div>
                <div>
                  <label style={labelStyle}>Niet-onderhandelbare dagen</label>
                  <div style={{ display:"flex", gap:7 }}>
                    {DAYS.map((day,i)=>(
                      <button key={day} onClick={()=>{ const d=(editingStaff.fixedDays || []).includes(day)?(editingStaff.fixedDays||[]).filter(x=>x!==day):[...(editingStaff.fixedDays||[]),day]; setEditingStaff({...editingStaff,fixedDays:d}); }} style={{ flex:1, padding:"9px 5px", borderRadius:8, fontFamily:"Outfit", fontSize:12, fontWeight:700, cursor:"pointer", border:`2px solid ${(editingStaff.fixedDays || []).includes(day)?"#DC2626":"#E2E8F0"}`, background:(editingStaff.fixedDays || []).includes(day)?"#DC2626":"white", color:(editingStaff.fixedDays || []).includes(day)?"white":"#64748B" }}>{DAY_SHORT[i]}</button>
                    ))}
                  </div>
                  <div style={{ fontSize:12, color:"#64748B", marginTop:6 }}>
                    Dagen die hier geselecteerd zijn moeten altijd worden ingepland. De planner houdt hier rekening mee bij auto-genereren.
                  </div>
                </div>
                {renderTaskAndLeaveEditor()}
              </>
            )}

          </div>
          <div style={{ display:"flex", gap:10, marginTop:24 }}>
            <button onClick={()=>setShowStaffModal(false)} style={{ flex:1, padding:"12px", borderRadius:10, border:"1px solid #CBD5E1", background:"white", cursor:"pointer", fontFamily:"Outfit", fontSize:15, fontWeight:600, color:"#64748B" }}>Annuleren</button>
            <button onClick={saveStaffItem} style={{ flex:2, ...btnPrimary, padding:"12px" }}>💾 Opslaan</button>
          </div>
        </Modal>
      )}

      {/* ── MODAL: Groepen ── */}
      {showGroupModal && (
        <Modal onClose={()=>setShowGroupModal(false)} wide>
          <h3 style={{ fontSize:20, fontWeight:800, color:"#1E3A5F", marginBottom:6 }}>🏷️ Groepen bewerken</h3>
          <p style={{ color:"#64748B", fontSize:13, marginBottom:20 }}>Namen aanpassen, volgorde wijzigen of verwijderen. Druk Enter om snel toe te voegen.</p>
          <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:16 }}>
            {editingGroups.map((g,i)=>(
              <div key={i} style={{ display:"flex", gap:8, alignItems:"center" }}>
                <div style={{ width:14, height:14, borderRadius:4, background:CLASS_COLORS[i%CLASS_COLORS.length], flexShrink:0 }}/>
                <input value={g} onChange={e=>{ const copy=[...editingGroups]; copy[i]=e.target.value; setEditingGroups(copy); }} style={{ ...inputStyle, flex:1 }}/>
                {i>0&&<button onClick={()=>{ const copy=[...editingGroups]; [copy[i-1],copy[i]]=[copy[i],copy[i-1]]; setEditingGroups(copy); }} style={{ background:"#F1F5F9", border:"none", borderRadius:7, padding:"7px 9px", cursor:"pointer" }}>⬆️</button>}
                {i<editingGroups.length-1&&<button onClick={()=>{ const copy=[...editingGroups]; [copy[i],copy[i+1]]=[copy[i+1],copy[i]]; setEditingGroups(copy); }} style={{ background:"#F1F5F9", border:"none", borderRadius:7, padding:"7px 9px", cursor:"pointer" }}>⬇️</button>}
                <button onClick={()=>{ const copy=[...editingGroups]; copy.splice(i,1); setEditingGroups(copy); }} style={{ background:"#FEF2F2", border:"none", borderRadius:7, padding:"7px 9px", cursor:"pointer", color:"#DC2626" }}>🗑️</button>
              </div>
            ))}
          </div>
          <div style={{ display:"flex", gap:8, marginBottom:20 }}>
            <input value={newGroupName} onChange={e=>setNewGroupName(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter"&&newGroupName.trim()){ setEditingGroups([...editingGroups,newGroupName.trim()]); setNewGroupName(""); }}}
              style={{ ...inputStyle, flex:1 }} placeholder="Nieuwe groepsnaam (bijv. Groep 3/4)..."/>
            <button onClick={()=>{ if(newGroupName.trim()){ setEditingGroups([...editingGroups,newGroupName.trim()]); setNewGroupName(""); }}} style={{ ...btnPrimary, padding:"10px 18px", whiteSpace:"nowrap" }}>+ Toevoegen</button>
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={()=>setShowGroupModal(false)} style={{ flex:1, padding:"12px", borderRadius:10, border:"1px solid #CBD5E1", background:"white", cursor:"pointer", fontFamily:"Outfit", fontSize:15, fontWeight:600, color:"#64748B" }}>Annuleren</button>
            <button onClick={saveGroups} style={{ flex:2, ...btnPrimary, padding:"12px" }}>✅ Groepen opslaan</button>
          </div>
        </Modal>
      )}
      {/* ── MODAL: Versiegeschiedenis ── */}
      {showVersionHistory && (
        <Modal onClose={()=>setShowVersionHistory(false)} wide>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12, marginBottom:18 }}>
            <div>
              <h3 style={{ fontSize:20, fontWeight:800, color:"#1E3A5F", margin:"0 0 6px" }}>🕘 Versiegeschiedenis</h3>
              <p style={{ color:"#64748B", margin:0, fontSize:13 }}>SharePoint-achtig: één huidige planning, met maximaal 7 herstelbare versies erachter. Oudere versies worden automatisch opgeschoond om opslag en egress laag te houden.</p>
            </div>
            <button onClick={refreshVersionHistory} style={{ padding:"9px 12px", borderRadius:10, border:"1px solid #BFDBFE", background:"#EFF6FF", color:"#1D4ED8", cursor:"pointer", fontFamily:"Outfit", fontSize:13, fontWeight:700 }}>Vernieuw</button>
          </div>
          <div style={{ display:"flex", gap:10, marginBottom:14, flexWrap:"wrap" }}>
            <button onClick={createManualVersionNow} style={{ ...btnPrimary, padding:"10px 14px", fontSize:13 }}>➕ Maak versie van nu</button>
            <button onClick={()=>setShowVersionHistory(false)} style={{ padding:"10px 14px", borderRadius:10, border:"1px solid #E2E8F0", background:"white", cursor:"pointer", fontFamily:"Outfit", fontSize:13, color:"#64748B", fontWeight:700 }}>Sluiten</button>
          </div>
          <div style={{ border:"1px solid #E2E8F0", borderRadius:14, overflow:"hidden" }}>
            {isLoadingVersions ? (
              <div style={{ padding:18, color:"#64748B" }}>Versies laden...</div>
            ) : versionHistory.length === 0 ? (
              <div style={{ padding:18, color:"#64748B" }}>Nog geen versies opgeslagen. Klik op <strong>Maak versie van nu</strong>.</div>
            ) : (
              versionHistory.map(v => (
                <div key={v.id} style={{ display:"grid", gridTemplateColumns:isMobile?"1fr":"90px 1fr auto auto", gap:10, alignItems:"center", padding:"12px 14px", borderBottom:"1px solid #E2E8F0", background:"white" }}>
                  <div style={{ fontWeight:800, color:"#1E3A5F" }}>Versie {v.version_number}</div>
                  <div>
                    <div style={{ fontSize:13, fontWeight:700, color:"#334155" }}>Naam: {v.label || "Versie"}</div>
                    <div style={{ fontSize:12, color:"#64748B" }}>{v.created_at ? new Date(v.created_at).toLocaleString("nl-NL") : "Geen datum"}</div>
                  </div>
                  <div style={{ display:"flex", gap:8, justifyContent:isMobile?"flex-start":"flex-end", flexWrap:"wrap" }}>
                    <button onClick={()=>restoreSupabaseVersion(v)} style={{ padding:"8px 12px", borderRadius:9, border:"1px solid #C4B5FD", background:"#F5F3FF", color:"#6D28D9", cursor:"pointer", fontFamily:"Outfit", fontSize:13, fontWeight:800 }}>Terugzetten</button>
                    <button onClick={()=>deleteSupabaseVersion(v)} style={{ padding:"8px 12px", borderRadius:9, border:"1px solid #FECACA", background:"#FEF2F2", color:"#DC2626", cursor:"pointer", fontFamily:"Outfit", fontSize:13, fontWeight:800 }}>Verwijderen</button>
                  </div>
                </div>
              ))
            )}
          </div>
        </Modal>
      )}


      {confirmDeleteFormation && (
        <Modal onClose={()=>setConfirmDeleteFormation(false)}>
          <div style={{ fontSize:40, marginBottom:10 }}>🗂️</div>
          <h3 style={{ fontSize:18, fontWeight:800, color:"#1E3A5F", marginBottom:6 }}>Opgeslagen planning verwijderen?</h3>
          <p style={{ color:"#64748B", marginBottom:22 }}>Weet je zeker dat je <strong>{formationName}</strong> wilt verwijderen? Deze actie kan niet ongedaan worden gemaakt.</p>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={()=>setConfirmDeleteFormation(false)} style={{ flex:1, padding:"12px", borderRadius:10, border:"1px solid #CBD5E1", background:"white", cursor:"pointer", fontFamily:"Outfit", fontSize:15, fontWeight:600, color:"#64748B" }}>Annuleren</button>
            <button onClick={deleteCurrentFormation} style={{ flex:1, padding:"12px", borderRadius:10, border:"none", background:"#DC2626", color:"white", cursor:"pointer", fontFamily:"Outfit", fontSize:15, fontWeight:700 }}>Verwijderen</button>
          </div>
        </Modal>
      )}

      {/* ── MODAL: Verwijderen ── */}
      {confirmDelete && (
        <Modal onClose={()=>setConfirmDelete(null)}>
          <div style={{ fontSize:40, marginBottom:10 }}>🗑️</div>
          <h3 style={{ fontSize:18, fontWeight:800, color:"#1E3A5F", marginBottom:6 }}>Verwijderen?</h3>
          <p style={{ color:"#64748B", marginBottom:22 }}>Weet je zeker dat je <strong>{confirmDelete.name}</strong> wilt verwijderen?</p>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={()=>setConfirmDelete(null)} style={{ flex:1, padding:"12px", borderRadius:10, border:"1px solid #CBD5E1", background:"white", cursor:"pointer", fontFamily:"Outfit", fontSize:15, fontWeight:600, color:"#64748B" }}>Annuleren</button>
            <button onClick={()=>{ setStaff(staff.filter(s=>s.id!==confirmDelete.id)); notif("Medewerker verwijderd."); setConfirmDelete(null); }} style={{ flex:1, padding:"12px", borderRadius:10, border:"none", background:"#DC2626", color:"white", cursor:"pointer", fontFamily:"Outfit", fontSize:15, fontWeight:700 }}>Verwijderen</button>
          </div>
        </Modal>
      )}

      {/* ── MODAL: Auto-opties ── */}
      {showAutoOptions && (
        <Modal onClose={()=>setShowAutoOptions(false)} wide>
          <h3 style={{ fontSize:20, fontWeight:800, color:"#1E3A5F", marginBottom:6 }}>✨ Auto-genereren opties</h3>
          <p style={{ color:"#64748B", fontSize:13, marginBottom:20 }}>Stel in wat de automatische planner moet doen.</p>
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>

            <div>
              <label style={labelStyle}>Wat invullen?</label>
              <div style={{ display:"flex", gap:8 }}>
                {[["both","Leerkrachten + Ondersteuning"],["teachers","Alleen leerkrachten"],["support","Alleen ondersteuning"]].map(([val,label])=>(
                  <button key={val} onClick={()=>setAutoOptions({...autoOptions,mode:val})} style={{ flex:1, padding:"10px 8px", borderRadius:10, fontFamily:"Outfit", fontSize:13, fontWeight:600, cursor:"pointer", border:`2px solid ${autoOptions.mode===val?"#7C3AED":"#E2E8F0"}`, background:autoOptions.mode===val?"#EDE9FE":"white", color:autoOptions.mode===val?"#7C3AED":"#64748B", textAlign:"center" }}>{label}</button>
                ))}
              </div>
            </div>

            {(autoOptions.mode === "teachers" || autoOptions.mode === "both") && (
              <div>
                <label style={labelStyle}>Maximaal leerkrachten per klas per week</label>
                <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                  {[1,2,3,4,5].map(n=>(
                    <button key={n} onClick={()=>setAutoOptions({...autoOptions,maxTeachersPerClass:n})} style={{ width:44, height:38, borderRadius:8, fontFamily:"Outfit", fontSize:16, fontWeight:700, cursor:"pointer", border:`2px solid ${autoOptions.maxTeachersPerClass===n?"#7C3AED":"#E2E8F0"}`, background:autoOptions.maxTeachersPerClass===n?"#7C3AED":"white", color:autoOptions.maxTeachersPerClass===n?"white":"#64748B" }}>{n}</button>
                  ))}
                </div>
                <div style={{ fontSize:12, color:"#64748B", marginTop:6 }}>Bij 2+ leerkrachten op één dag geldt om-de-week (0,1 FTE p.p. die dag).</div>
              </div>
            )}

            {(autoOptions.mode === "teachers" || autoOptions.mode === "both") && (
              <div>
                <label style={labelStyle}>Voorkeur voor één leerkracht per dag</label>
                <button onClick={()=>setAutoOptions({...autoOptions,preferSingleTeacher:!autoOptions.preferSingleTeacher})} style={{ width:"100%", display:"flex", alignItems:"center", gap:12, padding:"10px 14px", borderRadius:10, border:`1.5px solid ${autoOptions.preferSingleTeacher?"#BBF7D0":"#E2E8F0"}`, background:autoOptions.preferSingleTeacher?"#F0FDF4":"white", cursor:"pointer", fontFamily:"Outfit" }}>
                  <span>{autoOptions.preferSingleTeacher?"✅":"⬜"}</span>
                  <span style={{ fontSize:13, fontWeight:600, color:autoOptions.preferSingleTeacher?"#166534":"#64748B" }}>Probeer zoveel mogelijk volle dagen (0,2 FTE) per leerkracht te plannen</span>
                </button>
              </div>
            )}

            <div>
              <label style={labelStyle}>Niet-onderhandelbare dagen</label>
              <div style={{ width:"100%", display:"flex", alignItems:"center", gap:12, padding:"10px 14px", borderRadius:10, border:"1.5px solid #BBF7D0", background:"#F0FDF4", fontFamily:"Outfit" }}>
                <span>🔒</span>
                <span style={{ fontSize:13, fontWeight:600, color:"#166534" }}>Altijd hard: auto-genereren plant vaste dagen nooit op andere dagen.</span>
              </div>
            </div>

            <div>
              <label style={labelStyle}>Huidige planning</label>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={()=>setAutoOptions({...autoOptions,clearExisting:true})} style={{ flex:1, padding:"10px", borderRadius:10, fontFamily:"Outfit", fontSize:13, fontWeight:600, cursor:"pointer", border:`2px solid ${autoOptions.clearExisting?"#DC2626":"#E2E8F0"}`, background:autoOptions.clearExisting?"#FEF2F2":"white", color:autoOptions.clearExisting?"#DC2626":"#64748B" }}>🗑️ Wis alles en herplan</button>
                <button onClick={()=>setAutoOptions({...autoOptions,clearExisting:false})} style={{ flex:1, padding:"10px", borderRadius:10, fontFamily:"Outfit", fontSize:13, fontWeight:600, cursor:"pointer", border:`2px solid ${!autoOptions.clearExisting?"#16A34A":"#E2E8F0"}`, background:!autoOptions.clearExisting?"#F0FDF4":"white", color:!autoOptions.clearExisting?"#16A34A":"#64748B" }}>📋 Behoud huidige planning</button>
              </div>
              <div style={{ fontSize:12, color:"#64748B", marginTop:6 }}>{autoOptions.clearExisting ? "Alle bestaande toewijzingen worden gewist." : "Bestaande toewijzingen blijven staan, alleen lege plekken worden ingevuld."}</div>
            </div>

          </div>
          <div style={{ display:"flex", gap:10, marginTop:24 }}>
            <button onClick={()=>setShowAutoOptions(false)} style={{ flex:1, padding:"12px", borderRadius:10, border:"1px solid #CBD5E1", background:"white", cursor:"pointer", fontFamily:"Outfit", fontSize:15, fontWeight:600, color:"#64748B" }}>Annuleren</button>
            <button onClick={()=>{ setShowAutoOptions(false); autoGenerate(autoOptions); }} style={{ flex:2, ...btnPrimary, padding:"12px", background:"linear-gradient(135deg,#7C3AED,#5B21B6)" }}>✨ Genereren</button>
          </div>
        </Modal>
      )}

      {/* ── MODAL: Auto-resultaat ── */}
      {autoResult && (
        <Modal onClose={()=>setAutoResult(null)} wide>
          <h3 style={{ fontSize:20, fontWeight:800, color:"#1E3A5F", marginBottom:6 }}>✨ Formatie gegenereerd</h3>
          <p style={{ color:"#64748B", fontSize:13, marginBottom:18 }}>Resultaat op basis van de gekozen opties. Controleer en pas handmatig aan waar nodig.</p>
          <div style={{ display:"flex", flexDirection:"column", gap:8, maxHeight:420, overflowY:"auto", marginBottom:20 }}>
            {autoResult.map(({cls,teacherDays,teacherFte})=>{
              const color=classColor(cls);
              const entries=Object.entries(teacherDays);
              const ok=teacherFte>=1.0-0.001;
              return (
                <div key={cls} style={{ background:color+"12", border:`1.5px solid ${ok?color+"40":"#FCA5A5"}`, borderRadius:10, padding:"10px 14px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                    <div style={{ fontWeight:800, fontSize:14, color }}>{cls}</div>
                    <FtePill value={teacherFte} target={1.0} label="LK-FTE"/>
                  </div>
                  {entries.length===0
                    ? <span style={{ color:"#94A3B8", fontSize:12 }}>Geen leerkracht toegewezen</span>
                    : entries.map(([name,days])=>(
                      <div key={name} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
                        <span style={{ fontSize:13, fontWeight:600, color:"#1E293B", minWidth:110 }}>👩‍🏫 {name}</span>
                        <div style={{ display:"flex", gap:3 }}>
                          {DAY_SHORT.map(d=>(
                            <div key={d} style={{ width:26, height:20, borderRadius:4, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, background:days.includes(d)?color:"#F1F5F9", color:days.includes(d)?"white":"#CBD5E1" }}>{d}</div>
                          ))}
                        </div>
                      </div>
                    ))
                  }
                </div>
              );
            })}
          </div>
          <div style={{ background:"#FFFBEB", border:"1px solid #FDE68A", borderRadius:10, padding:"10px 14px", fontSize:13, color:"#92400E", marginBottom:20 }}>
            💡 Overgebleven uren blijven nu open staan bij de medewerker. Ondersteuning wordt alleen nog handmatig ingepland in de <strong>Planner</strong>.
          </div>
          <button onClick={()=>setAutoResult(null)} style={{ width:"100%", ...btnPrimary, padding:"12px" }}>Sluiten en bekijken</button>
        </Modal>
      )}

      <style>{`
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)} }
        @keyframes fadeIn  { from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)} }
        * { box-sizing:border-box; }
        input:focus { outline:2px solid #2563EB; outline-offset:1px; border-color:#2563EB!important; }
        ::-webkit-scrollbar{width:6px;height:6px}
        ::-webkit-scrollbar-track{background:#F1F5F9}
        ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
      `}</style>
    </div>
  );
}


const authClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const handleLogin = async (e) => {
    e.preventDefault();
    setError("");
    setLoading(true);
    try {
      const { data, error } = await authClient.auth.signInWithPassword({ email: email.trim(), password });
      if (error) throw error;
      if (data?.session?.access_token) {
        setAuthAccessToken(data.session.access_token);
        onLogin(data.session);
      }
    } catch (err) {
      console.error(err);
      setError("Inloggen mislukt. Controleer e-mailadres en wachtwoord.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"linear-gradient(135deg,#1E3A5F 0%,#2563EB 100%)", fontFamily:"'Outfit',sans-serif", padding:20 }}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
      <form onSubmit={handleLogin} style={{ width:"100%", maxWidth:420, background:"white", borderRadius:24, padding:28, boxShadow:"0 24px 70px rgba(15,23,42,0.28)", border:"1px solid rgba(255,255,255,0.5)" }}>
        <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:18 }}>
          <div style={{ width:52, height:52, borderRadius:16, background:"#DBEAFE", display:"flex", alignItems:"center", justifyContent:"center", fontSize:28 }}>🏫</div>
          <div>
            <div style={{ fontSize:12, fontWeight:800, color:"#64748B", textTransform:"uppercase", letterSpacing:.7 }}>Beveiligde toegang</div>
            <h1 style={{ margin:"2px 0 0", color:"#1E3A5F", fontSize:24, fontWeight:800 }}>Schoolplanner</h1>
          </div>
        </div>
        <p style={{ color:"#64748B", fontSize:14, lineHeight:1.5, margin:"0 0 20px" }}>Log in met je Supabase-gebruiker. De planner en versiegeschiedenis worden pas geladen na een geldige login.</p>
        <label style={{ display:"block", fontSize:13, fontWeight:800, color:"#334155", marginBottom:7 }}>E-mailadres</label>
        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} autoComplete="email" required placeholder="naam@school.nl" style={{ width:"100%", padding:"13px 14px", borderRadius:12, border:"1.5px solid #CBD5E1", fontFamily:"Outfit", fontSize:15, marginBottom:14 }} />
        <label style={{ display:"block", fontSize:13, fontWeight:800, color:"#334155", marginBottom:7 }}>Wachtwoord</label>
        <input type="password" value={password} onChange={e=>setPassword(e.target.value)} autoComplete="current-password" required placeholder="Wachtwoord" style={{ width:"100%", padding:"13px 14px", borderRadius:12, border:"1.5px solid #CBD5E1", fontFamily:"Outfit", fontSize:15, marginBottom:14 }} />
        {error && <div style={{ background:"#FEE2E2", color:"#991B1B", border:"1px solid #FECACA", padding:"10px 12px", borderRadius:12, fontSize:13, fontWeight:700, marginBottom:14 }}>{error}</div>}
        <button type="submit" disabled={loading} style={{ width:"100%", padding:"13px 18px", borderRadius:12, border:"none", background:loading?"#94A3B8":"linear-gradient(135deg,#2563EB,#1D4ED8)", color:"white", cursor:loading?"default":"pointer", fontFamily:"Outfit", fontSize:15, fontWeight:800, boxShadow:"0 8px 18px rgba(37,99,235,0.25)" }}>
          {loading ? "Inloggen..." : "Inloggen"}
        </button>
        <div style={{ marginTop:16, background:"#F8FAFC", border:"1px solid #E2E8F0", borderRadius:14, padding:12, color:"#64748B", fontSize:12, lineHeight:1.45 }}>
          Gebruikers maak je aan in Supabase via <strong>Authentication → Users</strong>. Alleen ingelogde gebruikers krijgen database-toegang via RLS.
        </div>
      </form>
      <style>{`*{box-sizing:border-box} input:focus{outline:2px solid #2563EB;outline-offset:1px;border-color:#2563EB!important}`}</style>
    </div>
  );
}

function AuthGate() {
  const [session, setSession] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    let mounted = true;
    authClient.auth.getSession().then(({ data }) => {
      if (!mounted) return;
      const currentSession = data?.session || null;
      setAuthAccessToken(currentSession?.access_token || "");
      setSession(currentSession);
      setChecking(false);
    });
    const { data: listener } = authClient.auth.onAuthStateChange((_event, nextSession) => {
      setAuthAccessToken(nextSession?.access_token || "");
      setSession(nextSession || null);
    });
    return () => {
      mounted = false;
      listener?.subscription?.unsubscribe?.();
    };
  }, []);

  const handleLogout = async () => {
    await authClient.auth.signOut();
    setAuthAccessToken("");
    setSession(null);
  };

  if (checking) {
    return <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Arial,sans-serif", color:"#1E3A5F", background:"#F0F4FF", fontWeight:700 }}>Loginstatus controleren...</div>;
  }
  if (!session) return <LoginScreen onLogin={setSession} />;
  return <FormatieApp onLogout={handleLogout} userEmail={session?.user?.email || ""} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AuthGate />);
  


</script>
